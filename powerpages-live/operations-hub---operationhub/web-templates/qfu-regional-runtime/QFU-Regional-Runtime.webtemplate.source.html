  function summarizeAnalyticsQuoteLines(lineRows, asOfDate) {
    var distinctQuotes = {};
    var quoteTotals = {};
    var agingBuckets = { "0-7": 0, "8-14": 0, "15-30": 0, "31+": 0 };
    var cssrMap = {};
    var amMap = {};
    var rejectionMap = {};
    var trendBuckets = {};
    var openQuoteValue = 0;
    var convertedQuoteValue = 0;
    var weightedGpNumerator = 0;
    var weightedGpDenominator = 0;

    (lineRows || []).forEach(function (row) {
      var quoteNumber = row.quoteNumber || "";
      if (!quoteNumber) {
        return;
      }
      distinctQuotes[quoteNumber] = true;
      if (!quoteTotals[quoteNumber]) {
        quoteTotals[quoteNumber] = {
          quoteNumber: quoteNumber,
          customer: row.customer,
          cssr: row.cssr,
          am: row.am,
          createdOn: row.createdOn,
          createdOnLabel: row.createdOnLabel,
          totalValue: 0,
          openValue: 0,
          convertedValue: 0
        };
      }
      quoteTotals[quoteNumber].totalValue += row.value;
      quoteTotals[quoteNumber].openValue += row.openValue;
      quoteTotals[quoteNumber].convertedValue += row.convertedValue;
      openQuoteValue += row.openValue;
      convertedQuoteValue += row.convertedValue;
      weightedGpNumerator += row.value * row.gpRatio;
      weightedGpDenominator += row.value;
      cssrMap[row.cssr] = (cssrMap[row.cssr] || 0) + row.value;
      amMap[row.am] = (amMap[row.am] || 0) + row.value;
      if (row.rejectionReason) {
        rejectionMap[row.rejectionReason] = (rejectionMap[row.rejectionReason] || 0) + 1;
      }
      if (row.createdOn) {
        var trendKey = snapshotDayKey(row.createdOn);
        if (trendKey) {
          if (!trendBuckets[trendKey]) {
            trendBuckets[trendKey] = {
              day: row.createdOn,
              createdValue: 0,
              openValue: 0,
              convertedValue: 0,
              lineCount: 0,
              quoteKeys: {}
            };
          }
          trendBuckets[trendKey].createdValue += row.value;
          trendBuckets[trendKey].openValue += row.openValue;
          trendBuckets[trendKey].convertedValue += row.convertedValue;
          trendBuckets[trendKey].lineCount += 1;
          trendBuckets[trendKey].quoteKeys[quoteNumber] = true;
        }
        var ageDays = Math.max(0, daysBetween(asOfDate, row.createdOn));
        if (ageDays <= 7) {
          agingBuckets["0-7"] += row.value;
        } else if (ageDays <= 14) {
          agingBuckets["8-14"] += row.value;
        } else if (ageDays <= 30) {
          agingBuckets["15-30"] += row.value;
        } else {
          agingBuckets["31+"] += row.value;
        }
      }
    });

    var quoteRows = Object.keys(quoteTotals).map(function (key) {
      var row = quoteTotals[key];
      row.ageDays = row.createdOn ? Math.max(0, daysBetween(asOfDate, row.createdOn)) : 0;
      return row;
    }).sort(function (left, right) {
      return right.openValue - left.openValue || right.totalValue - left.totalValue;
    });

    var rankingFromMap = function (sourceMap) {
      return Object.keys(sourceMap).map(function (key) {
        return { label: key, value: sourceMap[key], detail: formatCompactCurrency(sourceMap[key]) + " quoted" };
      }).sort(function (left, right) {
        return right.value - left.value;
      });
    };

    var reasonRows = Object.keys(rejectionMap).map(function (key) {
      return { label: key, value: rejectionMap[key], detail: String(rejectionMap[key]) + " lines" };
    }).sort(function (left, right) {
      return right.value - left.value;
    });

    var distinctQuoteCount = Object.keys(distinctQuotes).length;
    var convertedQuoteCount = quoteRows.filter(function (row) { return row.convertedValue > 0; }).length;
    return {
      lineRowCount: lineRows.length,
      distinctQuoteCount: distinctQuoteCount,
      openQuoteValue: openQuoteValue,
      convertedQuoteValue: convertedQuoteValue,
      conversionByValue: convertedQuoteValue + openQuoteValue > 0 ? convertedQuoteValue / (convertedQuoteValue + openQuoteValue) : 0,
      convertedQuoteCount: convertedQuoteCount,
      conversionByCount: distinctQuoteCount > 0 ? convertedQuoteCount / distinctQuoteCount : 0,
      weightedGpRatio: weightedGpDenominator > 0 ? weightedGpNumerator / weightedGpDenominator : 0,
      agingRows: Object.keys(agingBuckets).map(function (key) {
        return { label: key + " days", value: agingBuckets[key], detail: formatCompactCurrency(agingBuckets[key]) };
      }),
      cssrRows: rankingFromMap(cssrMap),
      amRows: rankingFromMap(amMap),
      rejectionRows: reasonRows,
      quoteRows: quoteRows,
      trendRows: Object.keys(trendBuckets).sort().map(function (key) {
        var bucket = trendBuckets[key];
        return {
          day: bucket.day,
          dayKey: key,
          dayLabel: bucket.day ? formatBusinessDate(bucket.day) : key,
          shortLabel: bucket.day ? bucket.day.toLocaleDateString("en-CA", { month: "short", day: "numeric" }) : key,
          createdValue: bucket.createdValue,
          openValue: bucket.openValue,
          convertedValue: bucket.convertedValue,
          lineCount: bucket.lineCount,
          quoteCount: Object.keys(bucket.quoteKeys).length
        };
      })
    };
  }

  function analyticsAverage(values) {
    var valid = (values || []).filter(function (value) {
      return Number.isFinite(value);
    });
    if (!valid.length) {
      return 0;
    }
    return valid.reduce(function (total, value) {
      return total + value;
    }, 0) / valid.length;
  }

  function analyticsRollingAverage(rows, endIndex, accessor, windowSize) {
    var startIndex = Math.max(0, endIndex - Math.max(1, windowSize || 1) + 1);
    var values = rows.slice(startIndex, endIndex + 1).map(function (row) {
      return toNumber(accessor(row));
    });
    return analyticsAverage(values);
  }

  function analyticsCorrelationCoefficient(rows, leftAccessor, rightAccessor) {
    var pairs = (rows || []).map(function (row) {
      return {
        left: toNumber(leftAccessor(row)),
        right: toNumber(rightAccessor(row))
      };
    }).filter(function (pair) {
      return Number.isFinite(pair.left) && Number.isFinite(pair.right) && (pair.left !== 0 || pair.right !== 0);
    });
    if (pairs.length < 3) {
      return null;
    }
    var leftMean = analyticsAverage(pairs.map(function (pair) { return pair.left; }));
    var rightMean = analyticsAverage(pairs.map(function (pair) { return pair.right; }));
    var numerator = 0;
    var leftVariance = 0;
    var rightVariance = 0;
    pairs.forEach(function (pair) {
      var leftDelta = pair.left - leftMean;
      var rightDelta = pair.right - rightMean;
      numerator += leftDelta * rightDelta;
      leftVariance += leftDelta * leftDelta;
      rightVariance += rightDelta * rightDelta;
    });
    if (leftVariance <= 0 || rightVariance <= 0) {
      return null;
    }
    return numerator / Math.sqrt(leftVariance * rightVariance);
  }

  function analyticsTrendSyncMeta(value) {
    if (!Number.isFinite(value)) {
      return {
        label: "Insufficient overlap",
        detail: "At least three shared days are needed before quote build and billed sales can be compared.",
        tone: "info"
      };
    }
    if (value >= 0.65) {
      return {
        label: "Strong positive",
        detail: "Quote build and billed sales are rising and easing together in the displayed same-day window.",
        tone: "good"
      };
    }
    if (value >= 0.35) {
      return {
        label: "Positive",
        detail: "Quote build and billed sales are broadly moving together, but not tightly enough to call it locked in.",
        tone: "good"
      };
    }
    if (value > -0.15) {
      return {
        label: "Loose",
        detail: "The same-day relationship is weak right now, so treat quote build and billed sales as separate signals.",
        tone: "warning"
      };
    }
    return {
      label: "Inverse",
      detail: "The same-day relationship is moving against itself in the displayed window, so demand build is not showing up in billed sales yet.",
      tone: "warning"
    };
  }

  function buildAnalyticsRevenueMotion(quoteSummary, opsSummary) {
    var quoteRows = quoteSummary && quoteSummary.trendRows || [];
    var salesRows = opsSummary && opsSummary.trendRows || [];
    var rowMap = {};

    function ensureRow(key, date, label) {
      if (!rowMap[key]) {
        rowMap[key] = {
          dayKey: key,
          day: date,
          dayLabel: label,
          shortLabel: date ? date.toLocaleDateString("en-CA", { month: "short", day: "numeric" }) : label,
          quoteCreatedValue: 0,
          quoteConnectedValue: 0,
          salesValue: 0,
          gpPct: 0,
          onTimeDelivery: 0
        };
      }
      return rowMap[key];
    }

    quoteRows.forEach(function (row) {
      var key = row.dayKey || snapshotDayKey(row.day);
      if (!key) {
        return;
      }
      var target = ensureRow(key, row.day, row.dayLabel);
      target.quoteCreatedValue = toNumber(row.createdValue);
      target.quoteConnectedValue = toNumber(row.convertedValue);
    });

    salesRows.forEach(function (row) {
      var key = snapshotDayKey(row.billingDay);
      if (!key) {
        return;
      }
      var target = ensureRow(key, row.billingDay, row.billingDayLabel);
      target.salesValue = toNumber(row.sales);
      target.gpPct = toNumber(row.gpPct);
      target.onTimeDelivery = toNumber(row.onTimeDelivery);
    });

    var rows = Object.keys(rowMap).sort().map(function (key) {
      return rowMap[key];
    }).filter(function (row) {
      return row.quoteCreatedValue > 0 || row.quoteConnectedValue > 0 || row.salesValue > 0;
    });

    var visibleRows = rows.slice(-10);
    var rollingWindow = visibleRows.length >= 5 ? 5 : Math.max(2, visibleRows.length);
    visibleRows.forEach(function (row, index) {
      row.quoteCreatedAvg = analyticsRollingAverage(visibleRows, index, function (item) { return item.quoteCreatedValue; }, rollingWindow);
      row.quoteConnectedAvg = analyticsRollingAverage(visibleRows, index, function (item) { return item.quoteConnectedValue; }, rollingWindow);
      row.salesAvg = analyticsRollingAverage(visibleRows, index, function (item) { return item.salesValue; }, rollingWindow);
    });

    var latestRow = visibleRows[visibleRows.length - 1] || null;
    var avgQuoteCreated = analyticsAverage(visibleRows.map(function (row) { return row.quoteCreatedAvg; }));
    var avgQuoteConnected = analyticsAverage(visibleRows.map(function (row) { return row.quoteConnectedAvg; }));
    var avgSales = analyticsAverage(visibleRows.map(function (row) { return row.salesAvg; }));
    var trendSyncValue = analyticsCorrelationCoefficient(visibleRows, function (row) { return row.quoteCreatedValue; }, function (row) { return row.salesValue; });

    return {
      rows: visibleRows,
      rollingWindow: rollingWindow,
      latestRow: latestRow,
      avgQuoteCreated: avgQuoteCreated,
      avgQuoteConnected: avgQuoteConnected,
      avgSales: avgSales,
      openQuoteValue: quoteSummary && quoteSummary.openQuoteValue || 0,
      convertedQuoteValue: quoteSummary && quoteSummary.convertedQuoteValue || 0,
      pipelineCoverDays: avgSales > 0 ? ((quoteSummary && quoteSummary.openQuoteValue || 0) / avgSales) : null,
      trendSyncValue: trendSyncValue,
      trendSync: analyticsTrendSyncMeta(trendSyncValue)
    };
  }

  function buildAnalyticsOpsDailyRow(record) {
    var billingDay = parseBusinessDate(record.qfu_billingday);
    var snapshotDate = parseBusinessDate(record.qfu_snapshotdate) || parseDate(record.createdon);
    return {
      currency: String(record.qfu_currencytype || "").trim() || "CAD",
      billingDay: billingDay,
      billingDayLabel: billingDay ? formatBusinessDate(billingDay) : "No Live Data Yet",
      snapshotDate: snapshotDate,
      isTotalRow: parseBoolean(record.qfu_istotalrow) === true,
      sales: toNumber(record.qfu_sales),
      gp: toNumber(record.qfu_gp),
      gpPct: normalizeAnalyticsRatio(record.qfu_gppct),
      onTimeDelivery: normalizeAnalyticsRatio(record.qfu_ontimedelivery)
    };
  }

  function normalizeAnalyticsRatio(value) {
    var amount = parseAnalyticsCellNumber(value);
    return Math.abs(amount) > 1.5 ? amount / 100 : amount;
  }

  function parseAnalyticsCellNumber(value) {
    if (value == null || value === "") {
      return 0;
    }
    if (typeof value === "number") {
      return Number.isFinite(value) ? value : 0;
    }
    var text = String(value).trim();
    if (!text) {
      return 0;
    }
    var negative = text.charAt(0) === "(" && text.charAt(text.length - 1) === ")";
    var cleaned = text.replace(/[$,%(),]/g, "");
    var parsed = Number(cleaned);
    if (!Number.isFinite(parsed)) {
      return 0;
    }
    return negative ? -parsed : parsed;
  }

  function parseAnalyticsBudgetDate(value) {
    if (value == null || value === "") {
      return null;
    }
    if (typeof value === "number" || (/^\d+(?:\.\d+)?$/.test(String(value).trim()) && String(value).indexOf("-") < 0 && String(value).indexOf("/") < 0)) {
      var serial = Number(value);
      if (Number.isFinite(serial) && serial > 0) {
        var excelDate = new Date(1899, 11, 30);
        excelDate.setDate(excelDate.getDate() + Math.floor(serial));
        return buildLocalCalendarDate(excelDate.getFullYear(), excelDate.getMonth(), excelDate.getDate());
      }
    }
    return parseBusinessDate(value);
  }

  function firstAnalyticsBudgetValue(source, keys) {
    var index;
    if (!source) {
      return null;
    }
    for (index = 0; index < keys.length; index += 1) {
      if (Object.prototype.hasOwnProperty.call(source, keys[index]) && source[keys[index]] != null && String(source[keys[index]]).trim() !== "") {
        return source[keys[index]];
      }
    }
    return null;
  }

  function parseAnalyticsBudgetRows(jsonText) {
    if (!jsonText) {
      return [];
    }
    try {
      var parsed = JSON.parse(jsonText);
      return Array.isArray(parsed) ? parsed : [];
    } catch (error) {
      return [];
    }
  }

  function buildAnalyticsOpsDailyRecordsFromBudget(workspace) {
    var budgetRow = workspace && workspace.currentBudgetRow;
    var cadRows = budgetRow ? parseAnalyticsBudgetRows(budgetRow.qfu_opsdailycadjson) : [];
    var usdRows = budgetRow ? parseAnalyticsBudgetRows(budgetRow.qfu_opsdailyusdjson) : [];
    var latestBillingDay = cadRows.concat(usdRows).reduce(function (latest, row) {
      var billingDay = parseAnalyticsBudgetDate(firstAnalyticsBudgetValue(row, ["Billing Day", "billing_day", "BillingDay"]));
      if (!billingDay) {
        return latest;
      }
      return !latest || billingDay.getTime() > latest.getTime() ? billingDay : latest;
    }, null);
    var snapshotValue = latestBillingDay ? snapshotDayKey(latestBillingDay) : snapshotDayKey(parseBusinessDate(budgetRow && (budgetRow.qfu_lastupdated || budgetRow.createdon)));

    function projectRows(rows, currency) {
      return rows.map(function (row) {
        var billingValue = firstAnalyticsBudgetValue(row, ["Billing Day", "billing_day", "BillingDay"]);
        var billingText = normalizeText(billingValue);
        var isTotalRow = billingText === "total" || parseBoolean(firstAnalyticsBudgetValue(row, ["Is Total Row", "is_total_row", "isTotalRow"]));
        var billingDay = isTotalRow ? null : parseAnalyticsBudgetDate(billingValue);
        var sales = parseAnalyticsCellNumber(firstAnalyticsBudgetValue(row, ["Sales", "sales"]));
        var gp = parseAnalyticsCellNumber(firstAnalyticsBudgetValue(row, ["GP$ (LRMAC)", "GP$", "gp", "gp_value"]));
        var gpPct = normalizeAnalyticsRatio(firstAnalyticsBudgetValue(row, ["GP% (LRMAC)", "GP%", "gp_pct", "gppct"]));
        var onTimeDelivery = normalizeAnalyticsRatio(firstAnalyticsBudgetValue(row, ["On-Time Delivery", "OTD", "on_time_delivery"]));
        if (!isTotalRow && !billingDay && sales === 0 && gp === 0 && gpPct === 0 && onTimeDelivery === 0) {
          return null;
        }
        return {
          qfu_snapshotdate: snapshotValue,
          qfu_billingday: billingDay ? snapshotDayKey(billingDay) : null,
          qfu_istotalrow: isTotalRow,
          qfu_currencytype: currency,
          qfu_sales: sales,
          qfu_gp: gp,
          qfu_gppct: gpPct,
          qfu_ontimedelivery: onTimeDelivery,
          createdon: budgetRow && (budgetRow.qfu_lastupdated || budgetRow.createdon)
        };
      }).filter(function (row) {
        return !!row;
      });
    }

    return projectRows(cadRows, "CAD").concat(projectRows(usdRows, "USD"));
  }

  function summarizeAnalyticsOpsDaily(rows, preferredCurrency) {
    var normalized = (rows || []).map(buildAnalyticsOpsDailyRow);
    var currencies = normalized.reduce(function (list, row) {
      if (list.indexOf(row.currency) === -1) {
        list.push(row.currency);
      }
      return list;
    }, []);
    var selectedCurrency = currencies.indexOf(preferredCurrency) >= 0 ? preferredCurrency : (currencies[0] || "CAD");
    var snapshotKey = normalized.reduce(function (latestKey, row) {
      var key = snapshotDayKey(row.snapshotDate || row.billingDay);
      if (!key) {
        return latestKey;
      }
      return !latestKey || key > latestKey ? key : latestKey;
    }, "");
    var scopedRows = normalized.filter(function (row) {
      return row.currency === selectedCurrency && (!snapshotKey || snapshotDayKey(row.snapshotDate || row.billingDay) === snapshotKey);
    });
    var totalRow = scopedRows.filter(function (row) { return row.isTotalRow; })[0] || null;
    var trendRows = scopedRows.filter(function (row) { return !row.isTotalRow; }).sort(function (left, right) {
      return (left.billingDay ? left.billingDay.getTime() : 0) - (right.billingDay ? right.billingDay.getTime() : 0);
    });
    var asOf = scopedRows.reduce(function (latest, row) {
      return latestDate(latest, row.billingDay, row.snapshotDate);
    }, null);
    return {
      currencies: currencies,
      selectedCurrency: selectedCurrency,
      totalRow: totalRow,
      trendRows: trendRows,
      asOf: asOf
    };
  }

      daysOverdueNumber: backorderOverdueDays(record, startOfToday()),

    };

  function summarizeAnalyticsBackorders(rows, asOfDate) {
    var openRows = (rows || []).map(buildAnalyticsBackorderRecord).filter(function (row) {
      var openBacklogQuantity = row.qtyNotOnDeliveryPresent ? row.qtyNotOnDelivery : row.unshippedQuantity;
      return openBacklogQuantity > 0 && !normalizeText(row.rejectionReason);
    });
    var orderSeen = {};
    var blockedOrders = {};
    var shipConditionMap = {};
    var pendingApprovalValue = 0;
    var mustAddFreightValue = 0;
    var overdueBacklogValue = 0;

    openRows.forEach(function (row) {
      orderSeen[row.order] = true;
      shipConditionMap[row.shipCondition] = (shipConditionMap[row.shipCondition] || 0) + row.value;
      if (row.daysOverdueNumber > 0) {
        overdueBacklogValue += row.value;
      }
      if (row.delBlockDesc || row.billBlockDesc) {
        blockedOrders[row.order] = true;
      }
      if (normalizeText(row.delBlockDesc) === "pending approval") {
        pendingApprovalValue += row.value;
      }
      if (normalizeText(row.delBlockDesc) === "must add freight" || normalizeText(row.billBlockDesc).indexOf("freight") >= 0) {
        mustAddFreightValue += row.value;
      }
    });

    var shipConditionRows = Object.keys(shipConditionMap).map(function (key) {
      return { label: key, value: shipConditionMap[key], detail: formatCompactCurrency(shipConditionMap[key]) };
    }).sort(function (left, right) {
      return right.value - left.value;
    });

    var blockedRows = openRows.filter(function (row) {
      return !!blockedOrders[row.order];
    }).sort(function (left, right) {
      return right.value - left.value;
    });

    var asOf = openRows.reduce(function (latest, row) {
      return latestDate(latest, row.lineCreatedOn);
    }, null);

    return {
      openRows: openRows,
      openOrderCount: Object.keys(orderSeen).length,
      openBacklogValue: openRows.reduce(function (total, row) { return total + row.value; }, 0),
      overdueBacklogValue: overdueBacklogValue,
      blockedOrderCount: Object.keys(blockedOrders).length,
      pendingApprovalValue: pendingApprovalValue,
      mustAddFreightValue: mustAddFreightValue,
      shipConditionRows: shipConditionRows,
      blockedRows: blockedRows,
      asOf: asOf
    };
  }

  function summarizeAnalyticsMarginRows(rows) {
    var counts = {};
    var salesByType = {};

    var ageBuckets = {};

    (rows || []).forEach(function (row) {

      var ageDays = row.billingDateValue ? daysBetween(today, row.billingDateValue) : null;
      var bucketConfig = null;

      bucketConfigs.some(function (candidate) {
        if (ageDays !== null && ageDays >= candidate.min && ageDays <= candidate.max) {
          bucketConfig = candidate;
          return true;
        }
        return false;
      });

      if (bucketConfig) {
        if (!ageBuckets[bucketConfig.key]) {
          ageBuckets[bucketConfig.key] = { value: 0, count: 0 };
        }
        ageBuckets[bucketConfig.key].value += salesValue;
        ageBuckets[bucketConfig.key].count += 1;
      }

      if (!cssrMap[cssrKey]) {

  async function patchRecord(entitySet, id, body) {
    if (!id) {
      throw new Error("Missing Dataverse record id.");
    }
    await request("/_api/" + entitySet + "(" + encodeURIComponent(id) + ")", {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "If-Match": "*"
      },
      body: JSON.stringify(body)
    });
  }

  async function createRecord(entitySet, body) {
    await request("/_api/" + entitySet, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });
  }

  function invalidateRuntime() {
    RUNTIME_PROMISE = null;
    RUNTIME_STATE = null;
    try {
      if (typeof sessionStorage !== "undefined") {
        for (var cacheIdx = sessionStorage.length - 1; cacheIdx >= 0; cacheIdx--) {
          var cacheKey = sessionStorage.key(cacheIdx);
          if (isLegacyRuntimeCacheKey(cacheKey)) {
            sessionStorage.removeItem(cacheKey);
          }
        }
      }
    } catch (cacheClearErr) { /* ignore */ }
  }

  function inputValue(row, selector) {
    var element = row.querySelector(selector);
    return element ? String(element.value || "").trim() : "";
  }

  function checkboxValue(row, selector) {
    var element = row.querySelector(selector);
    return !!(element && element.checked);
  }

  async function rerenderAfterSave(root, tone, message) {
    FLASH_MESSAGE = { tone: tone, text: message };
    invalidateRuntime();
    await renderRoot(root);
  }

  async function saveRegionRow(root, button, state) {
    var row = button.closest("tr");
    var regionSlug = button.getAttribute("data-qfu-save-region");
    var region = state.regionMap[regionSlug];
    var regionName = inputValue(row, '[data-field="region-name"]') || (region && region.name) || regionSlug;
    var payload = {
      qfu_name: regionName,
      qfu_regionname: regionName,
      qfu_status: inputValue(row, '[data-field="status"]') || "awaiting",
      qfu_stalethresholdhours: parseInteger(inputValue(row, '[data-field="stale-hours"]'), region ? region.config.staleHours : DEFAULT_STALE_HOURS),
      qfu_budgetpacewarningpct: parseInteger(inputValue(row, '[data-field="budget-warn"]'), region ? region.config.budgetWarn : DEFAULT_BUDGET_WARN),
      qfu_overduequotewarningcount: parseInteger(inputValue(row, '[data-field="quote-warn"]'), region ? region.config.quoteWarn : DEFAULT_QUOTE_WARN),
      qfu_overduebackorderwarningcount: parseInteger(inputValue(row, '[data-field="backorder-warn"]'), region ? region.config.backorderWarn : DEFAULT_BACKORDER_WARN),
      qfu_managernote: inputValue(row, '[data-field="note"]')
    };

    await patchRecord("qfu_regions", row.getAttribute("data-record-id"), payload);

    var affectedBranches = state.branches.filter(function (branch) {
      return (branch.config.regionSlug || branch.regionSlug) === regionSlug;
    });

    for (var i = 0; i < affectedBranches.length; i += 1) {
      await patchRecord("qfu_branchs", affectedBranches[i].config.id, {
        qfu_regionname: regionName
      });
    }

    await rerenderAfterSave(root, "success", regionName + " region settings saved.");
  }

  async function saveBranchRow(root, button, state) {
    var row = button.closest("tr");
    var branchSlug = button.getAttribute("data-qfu-save-branch");
    var branch = state.branchMap[branchSlug];
    var regionSlug = inputValue(row, '[data-field="region-slug"]') || (branch && branch.config.regionSlug) || "southern-alberta";
    var region = state.regionMap[regionSlug];
    var branchName = inputValue(row, '[data-field="branch-name"]') || (branch && branch.name) || branchSlug;
    var payload = {
      qfu_name: (branch ? branch.code : "") + " " + branchName,
      qfu_branchname: branchName,
      qfu_regionslug: regionSlug,
      qfu_regionname: region ? region.name : regionSlug,
      qfu_branchstate: inputValue(row, '[data-field="state"]') || "awaiting",
      qfu_mailboxaddress: inputValue(row, '[data-field="mailbox"]'),
      qfu_stalethresholdhours: parseInteger(inputValue(row, '[data-field="stale-hours"]'), branch ? branch.config.staleHours : DEFAULT_STALE_HOURS),
      qfu_budgetpacewarningpct: parseInteger(inputValue(row, '[data-field="budget-warn"]'), branch ? branch.config.budgetWarn : DEFAULT_BUDGET_WARN),
      qfu_overduequotewarningcount: parseInteger(inputValue(row, '[data-field="quote-warn"]'), branch ? branch.config.quoteWarn : DEFAULT_QUOTE_WARN),
      qfu_overduebackorderwarningcount: parseInteger(inputValue(row, '[data-field="backorder-warn"]'), branch ? branch.config.backorderWarn : DEFAULT_BACKORDER_WARN),
      qfu_managernote: inputValue(row, '[data-field="note"]')
    };

    await patchRecord("qfu_branchs", row.getAttribute("data-record-id"), payload);

    var relatedFeeds = state.sourceFeeds.filter(function (feed) {
      return feed.qfu_branchslug === branchSlug;
    });

    for (var i = 0; i < relatedFeeds.length; i += 1) {
      await patchRecord("qfu_sourcefeeds", relatedFeeds[i].qfu_sourcefeedid, {
        qfu_regionslug: regionSlug
      });
    }

    await rerenderAfterSave(root, "success", (branch ? branch.code + " " : "") + branchName + " branch settings saved.");
  }

  async function saveFeedRow(root, button, state) {
    var row = button.closest("tr");
    var recordId = button.getAttribute("data-qfu-save-feed");
    var feed = state.sourceFeeds.filter(function (item) {
      return item.qfu_sourcefeedid === recordId;
    })[0] || null;
    var enabled = checkboxValue(row, '[data-field="enabled"]');
    var folderId = feedRequiresInboxLock(feed) ? "Inbox" : inputValue(row, '[data-field="folder"]');
    var payload = {
      qfu_mailboxaddress: inputValue(row, '[data-field="mailbox"]'),
      qfu_folderid: folderId,
      qfu_subjectfilter: inputValue(row, '[data-field="subject"]'),
      qfu_filenamepattern: inputValue(row, '[data-field="pattern"]'),
      qfu_enabled: enabled ? false : true
    };

    await patchRecord("qfu_sourcefeeds", recordId, payload);
    await rerenderAfterSave(root, "success", (feed ? feed.qfu_branchcode + " " + feed.qfu_sourcefamily : "Source feed") + (feedRequiresInboxLock(feed) ? " settings saved. Inbox trigger remains locked." : " settings saved."));
  }

  async function saveBudgetArchiveRow(root, button, state) {
    var row = button.closest("tr");
    var branchSlug = button.getAttribute("data-qfu-save-budget");
    var branch = state.branchMap[branchSlug];
    var fiscalYear = row.getAttribute("data-fiscal-year") || state.activeFiscalYear || activeFiscalYear(new Date());
    var fiscalYearValue = fiscalYearNumber(fiscalYear, new Date());
    var archiveMap = budgetArchiveMapForBranch(state.budgetArchives, branch, fiscalYear, new Date());
    var updatedCount = 0;

    for (var i = 0; i < FISCAL_MONTHS.length; i += 1) {
      var monthMeta = FISCAL_MONTHS[i];
      var rawValue = inputValue(row, '[data-field="budget-' + monthMeta.number + '"]');
      var existing = archiveMap[monthMeta.number];
      if (!rawValue && !existing) {
        continue;
      }

      var budgetValue = toNumber(rawValue);
      var payload = {
        qfu_name: branch.code + " " + monthMeta.shortLabel + " " + fiscalYear + " Budget Target",
        qfu_sourceid: branch.code + "|budgetarchive|" + fiscalYear + "|" + String(monthMeta.number).padStart(2, "0"),
        qfu_budgetgoal: budgetValue,
        qfu_month: monthMeta.number,
        qfu_monthname: monthMeta.fullLabel,
        qfu_year: fiscalYearValue,
        qfu_fiscalyear: fiscalYear,
        qfu_lastupdated: new Date().toISOString(),
        qfu_branchcode: branch.code,
        qfu_branchslug: branch.slug,
        qfu_regionslug: branch.regionSlug,
        qfu_sourcefamily: "Manager Panel"
      };

      if (existing) {
        await patchRecord("qfu_budgetarchives", existing.qfu_budgetarchiveid, payload);
      } else {
        await createRecord("qfu_budgetarchives", payload);
      }
      updatedCount += 1;
    }

    await rerenderAfterSave(root, "success", branch.code + " " + branch.name + " budget targets saved for " + fiscalYear + " (" + updatedCount + " months).");
  }

  function bindOpsActions(root, state) {
    root.querySelectorAll("[data-qfu-save-region]").forEach(function (button) {
      button.addEventListener("click", async function () {
        if (button.disabled) {
          return;
        }
        button.disabled = true;
        try {
          await saveRegionRow(root, button, state);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Region save failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });

    root.querySelectorAll("[data-qfu-save-branch]").forEach(function (button) {
      button.addEventListener("click", async function () {
        if (button.disabled) {
          return;
        }
        button.disabled = true;
        try {
          await saveBranchRow(root, button, state);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Branch save failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });

    root.querySelectorAll("[data-qfu-save-feed]").forEach(function (button) {
      button.addEventListener("click", async function () {
        if (button.disabled) {
          return;
        }
        button.disabled = true;
        try {
          await saveFeedRow(root, button, state);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Source feed save failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });

    root.querySelectorAll("[data-qfu-save-budget]").forEach(function (button) {
      button.addEventListener("click", async function () {
        if (button.disabled) {
          return;
        }
        button.disabled = true;
        try {
          await saveBudgetArchiveRow(root, button, state);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Budget target save failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });
  }

  function scheduleRerender(root) {
    if (!root || root.dataset.qfuRuntimeRenderScheduled === "1") {
      return;
    }
    root.dataset.qfuRuntimeRenderScheduled = "1";
    window.setTimeout(function () {
      if (!document.body.contains(root)) {
        return;
      }
      root.dataset.qfuRuntimeRenderScheduled = "";
      renderRoot(root).catch(function (error) {
        console.error("QFU runtime rerender failed", error);
      });
    }, 60);
  }

  function observeRoot(root) {
    if (!root || OBSERVERS.has(root)) {
      return;
    }
    var observer = new MutationObserver(function () {
      if (root.dataset.qfuRuntimeRendering === "1") {
        return;
      }
      if (!root.querySelector("[data-qfu-runtime-signature]")) {
        scheduleRerender(root);
      }
    });
    observer.observe(root, { childList: true });
    OBSERVERS.set(root, observer);
  }

  async function renderRoot(root) {
    observeRoot(root);
    var state = await loadRuntime();
    var pageType = root.getAttribute("data-page");
    var branchSlug = root.getAttribute("data-branch") || "";
    var regionSlug = root.getAttribute("data-region") || "";
    var branch = branchSlug ? state.branchMap[branchSlug] : null;
    var region = regionSlug ? state.regionMap[regionSlug] : null;
    var rawViewKey = new URLSearchParams(window.location.search).get("view") || "follow-up-queue";
    var viewKey = normalizeDetailViewKey(rawViewKey);
    var html = "";

    if (pageType === "detail" && rawViewKey !== viewKey) {
      var canonicalParams = new URLSearchParams(window.location.search);
      canonicalParams.set("view", viewKey);
      window.history.replaceState(window.history.state || {}, "", window.location.pathname + "?" + canonicalParams.toString() + window.location.hash);
    }

    if (pageType === "hub") {
      html = renderHub(state);
    } else if (pageType === "region" && region) {
      html = renderRegionLive(region);
    } else if (pageType === "branch" && branch) {
      html = renderBranchLive(branch);
    } else if (pageType === "detail" && branch) {
      html = await renderDetailLive(branch, viewKey);
    } else if (pageType === "ops") {
      html = renderOps(state);
    } else {
      html = '<div class="qfu-phase0-shell"><div class="qfu-phase0-empty-state"><strong>Page configuration missing</strong><p class="qfu-phase0-empty-copy">QFU runtime metadata was not found for this route.</p></div></div>';
    }

    html = renderRuntimeDiagnosticsMarkup(state, {
      pageType: pageType,
      branchSlug: branchSlug,
      regionSlug: regionSlug
    }) + html;

    root.dataset.qfuRuntimeRendering = "1";
    root.innerHTML = managedHtml(html);
    root.dataset.qfuRuntimeRendering = "";
    root.dataset.qfuRuntimeManaged = "1";

    if (pageType === "branch") {
      ensureRuntimeStyleElement("qfu-branch-home-dense-runtime-style", branchHomeDenseCssText());
    }

    if (pageType === "ops") {
      bindOpsActions(root, state);
    } else if (pageType === "branch") {
      bindDashboardPaging(root);
    } else if (pageType === "detail" && branch && viewKey === "ready-to-ship-not-pgid") {
      bindDeliveryNotPgiActions(root, branch);
    } else if (pageType === "detail" && branch && viewKey === "freight-worklist") {
      bindFreightWorklistActions(root, branch);
    }
  }

  function renderRuntimeFailure(root, error) {
    console.error("QFU regional runtime failed", error);
    root.innerHTML = managedHtml('<div class="qfu-phase0-shell"><div class="qfu-phase0-empty-state"><strong>Regional runtime failed</strong><p class="qfu-phase0-empty-copy">' + escapeHtml(error.message) + "</p></div></div>");
  }

  function bindDashboardPaging(root) {
    if (root.dataset.qfuDashboardPagingBound === "1") {
      return;
    }

    root.addEventListener("click", function (event) {
      var target = event.target;
      var button = target && target.closest ? target.closest("[data-qfu-dashboard-page]") : null;
      if (!button || !root.contains(button)) {
        return;
      }

      event.preventDefault();
      var paramName = button.getAttribute("data-qfu-dashboard-page");
      var pageNumber = parseInt(button.getAttribute("data-qfu-page-number") || "1", 10);
      if (!paramName || !Number.isFinite(pageNumber) || dashboardPageValue(paramName) === pageNumber) {
        return;
      }

      window.history.pushState({ qfuDashboardPage: true }, "", dashboardPageHref(paramName, pageNumber));
      renderRoot(root).catch(function (error) {
        renderRuntimeFailure(root, error);
      });
    });

    root.dataset.qfuDashboardPagingBound = "1";
  }

  function bindPopState() {
    if (document.body.dataset.qfuRuntimePopstateBound === "1") {
      return;
    }

    window.addEventListener("popstate", function () {
      var roots = document.querySelectorAll("[data-qfu-phase0]");
      Array.prototype.forEach.call(roots, function (root) {
        renderRoot(root).catch(function (error) {
          renderRuntimeFailure(root, error);
        });
      });
    });

    document.body.dataset.qfuRuntimePopstateBound = "1";
  }

  function mount() {
    bindPopState();
    var roots = document.querySelectorAll("[data-qfu-phase0]");
    Array.prototype.forEach.call(roots, function (root) {
      renderRoot(root).catch(function (error) {
        renderRuntimeFailure(root, error);
      });
    });
  }

  document.addEventListener("DOMContentLoaded", mount);
})();

</script>
