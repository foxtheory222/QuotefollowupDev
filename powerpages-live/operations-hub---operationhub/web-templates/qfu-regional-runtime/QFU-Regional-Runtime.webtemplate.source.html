<script>
(function () {
  "use strict";

  /*
   * QFU runtime conventions:
   * - INVERTED ENVIRONMENT: qfu_isactive false = active, true = inactive.
   * - Never parse business dates with raw new Date(isoWithZ) semantics; use parseBusinessDate/buildLocalCalendarDate.
   * - Current-month budget pace comes from qfu_budget; monthly targets come from qfu_budgetarchive.
   * - qfu_budgetarchive logical identity resolves by branch + month + fiscal year before qfu_sourceid.
   * - qfu_deliverynotpgi Power Pages behavior is reader/comment PATCH only; the exact base-row writer remains unproven.
   */
  var ENVIRONMENT_NAME = "Applied Canada Operations Hub";
  var DETAIL_PAGE_SIZE = 25;
  var DASHBOARD_PAGE_SIZE = 10;
  var DEFAULT_STALE_HOURS = 36;
  var DELIVERY_NOT_PGI_STALE_HOURS = 36;
  var DEFAULT_BUDGET_WARN = 85;
  var DEFAULT_QUOTE_WARN = 12;
  var DEFAULT_BACKORDER_WARN = 150;
  var CSSR_LEADERBOARD_AGE_OUTLIER_DAYS = 3650;
  var GETALL_MAX_PAGES = 50;
  var CONFIG_CACHE_TTL_MS = 5 * 60 * 1000;
  var QUOTES_FETCH_TOP = 5000;
  var BACKORDERS_FETCH_TOP = 5000;
  var BUDGETS_FETCH_TOP = 500;
  var BUDGET_ARCHIVES_FETCH_TOP = 500;
  var BRANCH_SUMMARY_FETCH_TOP = 500;
  var INGESTION_FETCH_TOP = 250;
  var DELIVERY_FETCH_TOP = 5000;
  var FREIGHT_FETCH_TOP = 5000;
  var FREIGHT_STALE_HOURS = 192;
  var FREIGHT_HIGH_VALUE_THRESHOLD = 250;
  var FREIGHT_ARCHIVE_AFTER_DAYS = 60;
  var RUNTIME_CACHE_VERSION = "20260420c";
  var FLASH_MESSAGE = null;
  var RUNTIME_PROMISE = null;
  var RUNTIME_STATE = null;
  var OBSERVERS = new WeakMap();

  var REGION_ROUTE_MAP = {
    "southern-alberta": "/southern-alberta",
    "northern-alberta": "/northern-alberta",
    "saskatchewan": "/saskatchewan"
  };

  var BRANCH_ROUTE_MAP = {
    "4171-calgary": {
      code: "4171",
      name: "Calgary",
      routeRegionSlug: "southern-alberta",
      pageUrl: "/southern-alberta/4171-calgary"
    },
    "4172-lethbridge": {
      code: "4172",
      name: "Lethbridge",
      routeRegionSlug: "southern-alberta",
      pageUrl: "/southern-alberta/4172-lethbridge"
    },
    "4173-medicine-hat": {
      code: "4173",
      name: "Medicine Hat",
      routeRegionSlug: "southern-alberta",
      pageUrl: "/southern-alberta/4173-medicine-hat"
    }
  };

  var DETAIL_VIEWS = {
    "follow-up-queue": { title: "Follow-up Queue" },
    "quotes": { title: "All Quotes" },
    "quote-detail": { title: "Quote Detail" },
    "overdue-quotes": { title: "Overdue Quotes" },
    "overdue-backorders": { title: "Overdue Backorder Lines" },
    "ready-to-ship-not-pgid": { title: "Ready to Ship, Not PGI'd" },
    "freight-worklist": { title: "Freight Ledger" },
    "team-progress": { title: "Team Progress" },
    "analytics": { title: "Analytics" }
  };

  function normalizeDetailViewKey(viewKey) {
    return viewKey === "workload" ? "team-progress" : viewKey;
  }

  function inferredRegionSlug(context) {
    if (context && context.regionSlug) {
      return context.regionSlug;
    }
    var branchSlug = context && context.branchSlug;
    var route = branchSlug ? BRANCH_ROUTE_MAP[branchSlug] : null;
    return route && route.routeRegionSlug ? route.routeRegionSlug : "";
  }

  function regionDisplayNameForSlug(slug) {
    if (slug === "southern-alberta") {
      return "Southern Alberta";
    }
    if (slug === "northern-alberta") {
      return "Northern Alberta";
    }
    if (slug === "saskatchewan") {
      return "Saskatchewan";
    }
    return "Unknown Region";
  }

  var FISCAL_MONTHS = [
    { number: 7, shortLabel: "Jul", fullLabel: "July" },
    { number: 8, shortLabel: "Aug", fullLabel: "August" },
    { number: 9, shortLabel: "Sep", fullLabel: "September" },
    { number: 10, shortLabel: "Oct", fullLabel: "October" },
    { number: 11, shortLabel: "Nov", fullLabel: "November" },
    { number: 12, shortLabel: "Dec", fullLabel: "December" },
    { number: 1, shortLabel: "Jan", fullLabel: "January" },
    { number: 2, shortLabel: "Feb", fullLabel: "February" },
    { number: 3, shortLabel: "Mar", fullLabel: "March" },
    { number: 4, shortLabel: "Apr", fullLabel: "April" },
    { number: 5, shortLabel: "May", fullLabel: "May" },
    { number: 6, shortLabel: "Jun", fullLabel: "June" }
  ];

  function escapeHtml(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function toNumber(value) {
    var amount = Number(value);
    return Number.isFinite(amount) ? amount : 0;
  }

  function parseInteger(value, fallback) {
    var parsed = parseInt(value, 10);
    return Number.isFinite(parsed) ? parsed : fallback;
  }

  function buildLocalCalendarDate(year, monthIndex, dayOfMonth) {
    var parsed = new Date(year, monthIndex, dayOfMonth);
    if (Number.isNaN(parsed.getTime())) {
      return null;
    }
    if (parsed.getFullYear() !== year || parsed.getMonth() !== monthIndex || parsed.getDate() !== dayOfMonth) {
      return null;
    }
    return parsed;
  }

  function parseDate(value) {
    if (!value) {
      return null;
    }
    var parsed = new Date(value);
    return Number.isNaN(parsed.getTime()) ? null : parsed;
  }

  function parseBusinessDate(value) {
    if (!value) {
      return null;
    }
    if (value instanceof Date) {
      return buildLocalCalendarDate(value.getFullYear(), value.getMonth(), value.getDate());
    }
    var match = String(value).trim().match(/^(\d{4})-(\d{2})-(\d{2})(?:$|T)/);
    if (match) {
      return buildLocalCalendarDate(parseInt(match[1], 10), parseInt(match[2], 10) - 1, parseInt(match[3], 10));
    }
    var parsed = parseDate(value);
    return parsed ? buildLocalCalendarDate(parsed.getFullYear(), parsed.getMonth(), parsed.getDate()) : null;
  }

  function quoteCreatedMoment(record) {
    return parseBusinessDate(record && record.qfu_sourcedate) || parseDate(record && record.createdon);
  }

  function normalizeDisplayName(value, fallback) {
    var label = String(value == null ? "" : value).trim();
    return label || fallback;
  }

  function isMissingDisplayName(value) {
    var normalized = normalizeDisplayName(value, "").toLowerCase();
    return !normalized || normalized === "unassigned" || normalized === "none" || normalized === "0";
  }

  function normalizeCssrDisplayName(value, fallback) {
    var normalized = normalizeDisplayName(value, "");
    if (isMissingDisplayName(normalized)) {
      return fallback !== undefined ? fallback : "Unassigned";
    }
    return normalized;
  }

  function resolveTsrDisplay(primaryValue, secondaryValue, cssrValue) {
    var primary = normalizeDisplayName(primaryValue, "");
    if (!isMissingDisplayName(primary)) {
      return primary;
    }
    var secondary = normalizeDisplayName(secondaryValue, "");
    var cssr = normalizeDisplayName(cssrValue, "");
    if (!isMissingDisplayName(secondary) && (!cssr || secondary.toLowerCase() !== cssr.toLowerCase())) {
      return secondary;
    }
    return "None";
  }

  function quoteSourceMoment(record) {
    return quoteCreatedMoment(record);
  }

  function summaryMoment(record) {
    return parseDate(record && record.qfu_lastcalculatedon) || parseBusinessDate(record && record.qfu_summarydate) || parseDate(record && record.createdon);
  }

  function summaryBelongsToCalendarMonth(record, monthNumber, yearNumber) {
    var moment = summaryMoment(record);
    return !!(moment &&
      (moment.getMonth() + 1) === parseInteger(monthNumber, 0) &&
      moment.getFullYear() === parseInteger(yearNumber, 0));
  }

  function exceptionSnapshotMoment(record) {
    return parseBusinessDate(record && record.qfu_snapshotdate) || parseDate(record && record.createdon);
  }

  function parseBoolean(value) {
    if (value === true || value === false) {
      return value;
    }
    var text = String(value == null ? "" : value).trim().toLowerCase();
    if (text === "true" || text === "1" || text === "yes") {
      return true;
    }
    if (text === "false" || text === "0" || text === "no") {
      return false;
    }
    return null;
  }

  function operationalRowHasLifecycle(record) {
    return !!(record && (record.qfu_active != null || record.qfu_inactiveon != null || record.qfu_lastseenon != null));
  }

  function deliveryNotPgiRowIsActive(record) {
    var inactiveOn = parseDate(record && record.qfu_inactiveon) || parseBusinessDate(record && record.qfu_inactiveon);
    if (inactiveOn) {
      return false;
    }
    // In this environment the delivery board two-option field can invert between
    // raw boolean and formatted-label views. Treat inactiveon as the only hard
    // inactive signal until the writer path proves a stable polarity contract.
    return true;
  }

  function operationalRowIsActive(record) {
    if (record && (record.qfu_deliverynotpgiid || record.qfu_snapshotcapturedon != null && (record.qfu_deliverynumber != null || record.qfu_deliveryline != null))) {
      return deliveryNotPgiRowIsActive(record);
    }
    var inactiveOn = parseDate(record && record.qfu_inactiveon) || parseBusinessDate(record && record.qfu_inactiveon);
    if (inactiveOn) {
      return false;
    }
    var active = parseBoolean(record && record.qfu_active);
    if (active !== null) {
      return active;
    }
    return true;
  }

  function operationalLastSeenMoment(record) {
    return parseDate(record && record.qfu_lastseenon) ||
      parseDate(record && record.qfu_sourceupdatedon) ||
      parseBusinessDate(record && record.qfu_sourcedate) ||
      parseDate(record && record.qfu_snapshotcapturedon) ||
      parseDate(record && record.modifiedon) ||
      parseDate(record && record.createdon);
  }

  // INVERTED ENVIRONMENT: qfu_isactive false = active, true = inactive.
  function budgetRowIsActive(record) {
    return parseBoolean(record && record.qfu_isactive) === false;
  }

  function normalizeConfigKey(value) {
    return String(value == null ? "" : value).trim().toLowerCase();
  }

  function compositeIdentityValue(record, fieldNames) {
    var values = (fieldNames || []).map(function (fieldName) {
      var raw = record && record[fieldName];
      return raw != null && String(raw).trim() ? String(raw).trim() : "";
    }).filter(function (value) {
      return !!value;
    });
    return values.join("|");
  }

  function configIdentityValue(record, fieldNames) {
    var fields = fieldNames || [];
    for (var i = 0; i < fields.length; i += 1) {
      var raw = record && record[fields[i]];
      if (raw != null && String(raw).trim()) {
        return String(raw).trim();
      }
    }
    return "";
  }

  function configCompletenessScore(record, fieldNames) {
    var score = 0;
    var fields = fieldNames || [];
    for (var i = 0; i < fields.length; i += 1) {
      if (record && record[fields[i]] != null && String(record[fields[i]]).trim()) {
        score += 1;
      }
    }
    return score;
  }

  function configRowTimestamp(record) {
    return latestDate(record && record.modifiedon, record && record.createdon);
  }

  function compareConfigRows(left, right, options) {
    options = options || {};
    var leftRouteMatch = typeof options.routeMatch === "function" && options.routeMatch(left) ? 1 : 0;
    var rightRouteMatch = typeof options.routeMatch === "function" && options.routeMatch(right) ? 1 : 0;
    if (rightRouteMatch !== leftRouteMatch) {
      return rightRouteMatch - leftRouteMatch;
    }

    var leftCompleteness = configCompletenessScore(left, options.completenessFields);
    var rightCompleteness = configCompletenessScore(right, options.completenessFields);
    if (rightCompleteness !== leftCompleteness) {
      return rightCompleteness - leftCompleteness;
    }

    var leftSort = parseInteger(left && left.qfu_sortorder, 9999);
    var rightSort = parseInteger(right && right.qfu_sortorder, 9999);
    if (leftSort !== rightSort) {
      return leftSort - rightSort;
    }

    var leftTimestamp = typeof options.timestampValue === "function" ? options.timestampValue(left) : configRowTimestamp(left);
    var rightTimestamp = typeof options.timestampValue === "function" ? options.timestampValue(right) : configRowTimestamp(right);
    var leftTicks = leftTimestamp ? leftTimestamp.getTime() : 0;
    var rightTicks = rightTimestamp ? rightTimestamp.getTime() : 0;
    if (rightTicks !== leftTicks) {
      return rightTicks - leftTicks;
    }

    var idField = options.idField || "";
    var leftId = String(idField && left ? left[idField] || "" : "");
    var rightId = String(idField && right ? right[idField] || "" : "");
    return leftId.localeCompare(rightId);
  }

  // qfu_branch / qfu_region rows can drift into duplicate config rows in Dataverse.
  // Collapse them deterministically and warn instead of rendering duplicate dashboards.
  function dedupeConfigRows(rows, options) {
    options = options || {};
    var grouped = {};
    var groupOrder = [];
    (rows || []).forEach(function (row, index) {
      var identity = typeof options.keyValue === "function"
        ? options.keyValue(row, index)
        : configIdentityValue(row, options.keyFields);
      var key = normalizeConfigKey(identity || ((options.fallbackKeyPrefix || "row") + "-" + index));
      if (!grouped[key]) {
        grouped[key] = [];
        groupOrder.push(key);
      }
      grouped[key].push(row);
    });

    var dedupedRows = [];
    var duplicates = [];
    groupOrder.forEach(function (key) {
      var group = grouped[key];
      var ordered = group.slice().sort(function (left, right) {
        return compareConfigRows(left, right, options);
      });
      var winner = ordered[0] || null;
      if (winner) {
        dedupedRows.push(winner);
      }
      if (ordered.length > 1 && winner) {
        duplicates.push({
          key: key,
          identity: (typeof options.identityValue === "function"
            ? options.identityValue(winner)
            : configIdentityValue(winner, options.identityFields || options.keyFields)) || key,
          winner: winner,
          ignored: ordered.slice(1)
        });
      }
    });

    if (typeof options.sort === "function") {
      dedupedRows.sort(options.sort);
    }

    return {
      rows: dedupedRows,
      duplicates: duplicates
    };
  }

  function operationalIdentityValue(record, identityFields, options) {
    if ((!options || options.preferSourceId !== false) && record && record.qfu_sourceid != null && String(record.qfu_sourceid).trim()) {
      return String(record.qfu_sourceid).trim();
    }
    return compositeIdentityValue(record, identityFields || []);
  }

  function compareOperationalRows(left, right, options) {
    options = options || {};
    var leftPreferred = typeof options.prefer === "function" ? parseInteger(options.prefer(left), 0) : 0;
    var rightPreferred = typeof options.prefer === "function" ? parseInteger(options.prefer(right), 0) : 0;
    if (rightPreferred !== leftPreferred) {
      return rightPreferred - leftPreferred;
    }

    var leftMoment = typeof options.timestampValue === "function"
      ? options.timestampValue(left)
      : latestDate(left && left.modifiedon, left && left.createdon);
    var rightMoment = typeof options.timestampValue === "function"
      ? options.timestampValue(right)
      : latestDate(right && right.modifiedon, right && right.createdon);
    var leftTicks = leftMoment ? leftMoment.getTime() : 0;
    var rightTicks = rightMoment ? rightMoment.getTime() : 0;
    if (rightTicks !== leftTicks) {
      return rightTicks - leftTicks;
    }

    var idField = options.idField || "";
    var leftId = String(idField && left ? left[idField] || "" : "");
    var rightId = String(idField && right ? right[idField] || "" : "");
    return leftId.localeCompare(rightId);
  }

  function dedupeOperationalRows(rows, options) {
    options = options || {};
    var grouped = {};
    var groupOrder = [];

    (rows || []).forEach(function (row, index) {
      var identity = typeof options.identityValue === "function"
        ? options.identityValue(row, index)
        : operationalIdentityValue(row, options.identityFields, options);
      var key = normalizeConfigKey(identity || ((options.fallbackKeyPrefix || "row") + "-" + index));
      if (!grouped[key]) {
        grouped[key] = [];
        groupOrder.push(key);
      }
      grouped[key].push(row);
    });

    var dedupedRows = [];
    var duplicates = [];
    groupOrder.forEach(function (key) {
      var group = grouped[key];
      var ordered = group.slice().sort(function (left, right) {
        return compareOperationalRows(left, right, options);
      });
      var winner = ordered[0] || null;
      if (winner) {
        dedupedRows.push(winner);
      }
      if (winner && ordered.length > 1) {
        var activeCount = group.filter(function (record) {
          return operationalRowIsActive(record);
        }).length;
        var inactiveCount = group.length - activeCount;
        var hasLifecycle = group.some(function (record) {
          return operationalRowHasLifecycle(record);
        });
        duplicates.push({
          key: key,
          identity: typeof options.describeIdentity === "function" ? options.describeIdentity(winner) : (operationalIdentityValue(winner, options.identityFields, options) || key),
          winner: winner,
          ignored: ordered.slice(1),
          activeCount: activeCount,
          inactiveCount: inactiveCount,
          hasLifecycle: hasLifecycle,
          classification: hasLifecycle && activeCount <= 1 && inactiveCount >= 1 ? "history-reappearance" : "duplicate-current"
        });
      }
    });

    if (typeof options.sort === "function") {
      dedupedRows.sort(options.sort);
    }

    return {
      rows: dedupedRows,
      duplicates: duplicates
    };
  }

  function latestDate() {
    var latest = null;
    for (var i = 0; i < arguments.length; i += 1) {
      var candidate = parseDate(arguments[i]);
      if (candidate && (!latest || candidate > latest)) {
        latest = candidate;
      }
    }
    return latest;
  }

  function startOfToday() {
    var now = new Date();
    return new Date(now.getFullYear(), now.getMonth(), now.getDate());
  }

  function startOfMonth(date) {
    return new Date(date.getFullYear(), date.getMonth(), 1);
  }

  function endOfMonth(date) {
    return new Date(date.getFullYear(), date.getMonth() + 1, 0);
  }

  function isInCalendarMonth(value, monthDate) {
    var parsed = parseDate(value);
    return !!(parsed && monthDate && parsed.getFullYear() === monthDate.getFullYear() && parsed.getMonth() === monthDate.getMonth());
  }

  function daysBetween(later, earlier) {
    if (!later || !earlier) {
      return 0;
    }
    return Math.max(0, Math.floor((later.getTime() - earlier.getTime()) / 86400000));
  }

  function hoursBetween(later, earlier) {
    if (!later || !earlier) {
      return 0;
    }
    return Math.max(0, Math.floor((later.getTime() - earlier.getTime()) / 3600000));
  }

  function businessDaysBetweenInclusive(startDate, endDate) {
    if (!startDate || !endDate || startDate > endDate) {
      return 0;
    }

    var cursor = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
    var last = new Date(endDate.getFullYear(), endDate.getMonth(), endDate.getDate());
    var count = 0;

    while (cursor <= last) {
      var day = cursor.getDay();
      if (day !== 0 && day !== 6) {
        count += 1;
      }
      cursor.setDate(cursor.getDate() + 1);
    }

    return count;
  }

  function formatCurrency(value) {
    return new Intl.NumberFormat("en-CA", {
      style: "currency",
      currency: "CAD",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    }).format(toNumber(value));
  }

  function formatCompactCurrency(value) {
    return new Intl.NumberFormat("en-CA", {
      style: "currency",
      currency: "CAD",
      notation: "compact",
      maximumFractionDigits: 1
    }).format(toNumber(value));
  }

  function formatPercent(value) {
    var amount = toNumber(value);
    return new Intl.NumberFormat("en-CA", {
      style: "percent",
      minimumFractionDigits: 0,
      maximumFractionDigits: 1
    }).format(amount / 100);
  }

  function formatRatioPercent(value, fractionDigits) {
    var digits = fractionDigits == null ? 1 : fractionDigits;
    return new Intl.NumberFormat("en-CA", {
      style: "percent",
      minimumFractionDigits: digits,
      maximumFractionDigits: digits
    }).format(toNumber(value));
  }

  function percentWidth(value) {
    return Math.max(0, Math.min(toNumber(value), 100)).toFixed(1) + "%";
  }

  function activeFiscalYear(referenceDate) {
    var date = referenceDate || new Date();
    var fiscalYear = date.getMonth() >= 6 ? date.getFullYear() + 1 : date.getFullYear();
    return "FY" + String(fiscalYear).slice(-2);
  }

  function normalizeFiscalYear(value, fallbackDate) {
    var text = String(value || "").trim().toUpperCase();
    if (/^FY\d{2}$/.test(text)) {
      return text;
    }
    if (/^\d{4}$/.test(text)) {
      return "FY" + text.slice(-2);
    }
    return activeFiscalYear(fallbackDate);
  }

  function fiscalYearNumber(value, fallbackDate) {
    var label = normalizeFiscalYear(value, fallbackDate);
    return 2000 + parseInteger(label.slice(-2), (fallbackDate || new Date()).getFullYear() - 2000);
  }

  function fiscalMonthMeta(monthNumber) {
    var parsed = parseInteger(monthNumber, 0);
    for (var i = 0; i < FISCAL_MONTHS.length; i += 1) {
      if (FISCAL_MONTHS[i].number === parsed) {
        return FISCAL_MONTHS[i];
      }
    }
    return null;
  }

  function fiscalMonthLabel(monthNumber) {
    var meta = fiscalMonthMeta(monthNumber);
    return meta ? meta.fullLabel : "Current Month";
  }

  function fiscalMonthOrder(monthNumber) {
    for (var i = 0; i < FISCAL_MONTHS.length; i += 1) {
      if (FISCAL_MONTHS[i].number === parseInteger(monthNumber, 0)) {
        return i;
      }
    }
    return -1;
  }

  function fiscalMonthCalendarYear(fiscalYear, monthNumber, fallbackDate) {
    var yearNumber = fiscalYearNumber(fiscalYear, fallbackDate || new Date());
    return parseInteger(monthNumber, 0) >= 7 ? yearNumber - 1 : yearNumber;
  }

  function budgetSelectionScore(record, expectedMonth, expectedFiscalYear, fallbackDate) {
    var updated = latestDate(record && record.qfu_lastupdated, record && record.createdon);
    var created = parseDate(record && record.createdon);
    var rowFiscalYear = normalizeFiscalYear(record && (record.qfu_fiscalyear || record.qfu_year), fallbackDate || new Date());
    var rowMonth = parseInteger(record && record.qfu_month, 0);
    var rowSourceFamily = String(record && record.qfu_sourcefamily || "").trim().toUpperCase();
    return [
      rowFiscalYear === expectedFiscalYear ? 1 : 0,
      rowMonth === parseInteger(expectedMonth, 0) ? 1 : 0,
      rowSourceFamily === "SA1300" ? 1 : 0,
      budgetRowIsActive(record) ? 1 : 0,
      String(record && record.qfu_fiscalyear || "").trim() ? 1 : 0,
      toNumber(record && record.qfu_actualsales) > 0 ? 1 : 0,
      updated ? updated.getTime() : 0,
      created ? created.getTime() : 0
    ];
  }

  function canonicalBudgetArchiveSourceId(branch, fiscalYear, monthNumber, fallbackDate) {
    var resolvedFiscalYear = normalizeFiscalYear(fiscalYear, fallbackDate || new Date());
    var resolvedMonth = parseInteger(monthNumber, 0);
    if (!branch || !branch.code || !resolvedFiscalYear || !resolvedMonth) {
      return "";
    }
    return branch.code + "|budgetarchive|" + resolvedFiscalYear + "|" + String(resolvedMonth).padStart(2, "0");
  }

  function budgetArchiveSelectionScore(record, branch, monthNumber, fiscalYear, fallbackDate) {
    var referenceDate = fallbackDate || new Date();
    var expectedMonth = parseInteger(monthNumber, 0);
    var expectedFiscalYear = normalizeFiscalYear(fiscalYear, referenceDate);
    var expectedSourceId = canonicalBudgetArchiveSourceId(branch, expectedFiscalYear, expectedMonth, referenceDate);
    var updated = latestDate(record && record.qfu_lastupdated, record && record.modifiedon, record && record.createdon);
    var created = parseDate(record && record.createdon);
    var rowFiscalYear = normalizeFiscalYear(record && (record.qfu_fiscalyear || record.qfu_year), referenceDate);
    var rowMonth = parseInteger(record && record.qfu_month, 0);
    var sourceId = String(record && record.qfu_sourceid || "").trim();
    return [
      (record && (record.qfu_branchslug === branch.slug || record.qfu_branchcode === branch.code)) ? 1 : 0,
      rowFiscalYear === expectedFiscalYear ? 1 : 0,
      rowMonth === expectedMonth ? 1 : 0,
      sourceId === expectedSourceId ? 1 : 0,
      !(record && (record.qfu_budgetgoal === null || record.qfu_budgetgoal === undefined || String(record.qfu_budgetgoal).trim() === "")) ? 1 : 0,

  function compareSelectionScores(leftScore, rightScore) {
    for (var i = 0; i < Math.max(leftScore.length, rightScore.length); i += 1) {
      var leftValue = leftScore[i] || 0;
      var rightValue = rightScore[i] || 0;
      if (leftValue !== rightValue) {

    return 0;

  function selectBudgetRowForPeriod(branch, budgets, monthNumber, fiscalYear, fallbackDate) {

      var leftScore = budgetSelectionScore(left, expectedMonth, fiscalYear, fallbackDate);
      var rightScore = budgetSelectionScore(right, expectedMonth, fiscalYear, fallbackDate);
      for (var i = 0; i < leftScore.length; i += 1) {
        if (leftScore[i] !== rightScore[i]) {

      }
      return 0;

  function latestBudgetArchiveForBranch(budgetArchives, branch, monthNumber, fiscalYear, contextDate) {

      var rowFiscalYear = normalizeFiscalYear(row.qfu_fiscalyear || row.qfu_year, referenceDate);

        parseInteger(row.qfu_month, 0) === parseInteger(monthNumber, 0) &&
        rowFiscalYear === normalizeFiscalYear(fiscalYear, referenceDate);

  function budgetArchiveMapForBranch(budgetArchives, branch, fiscalYear, contextDate) {
    var referenceDate = contextDate || new Date();
    var map = {};
    (budgetArchives || []).forEach(function (row) {
      var rowFiscalYear = normalizeFiscalYear(row.qfu_fiscalyear || row.qfu_year, referenceDate);

        return;

      var existing = map[monthNumber];

      var existingScore = existing ? budgetArchiveSelectionScore(existing, branch, monthNumber, fiscalYear, referenceDate) : null;

  function backorderHasOverdueDateMismatch(record, today) {

  async function getToken() {
    var input = document.querySelector('input[name="__RequestVerificationToken"]');
    if (input && input.value) {
      return input.value;
    }
    if (window.shell && typeof window.shell.getTokenDeferred === "function") {
      return new Promise(function (resolve, reject) {
        try {
          window.shell.getTokenDeferred().done(resolve).fail(reject);
        } catch (error) {
          reject(error);
        }
      });
    }
    var response = await fetch("/_layout/tokenhtml", { credentials: "same-origin" });
    var html = await response.text();
    var container = document.createElement("div");
    container.innerHTML = html;
    var hidden = container.querySelector('input[name="__RequestVerificationToken"]');
    if (!hidden || !hidden.value) {
      throw new Error("Portal verification token was not available.");
    }
    return hidden.value;
  }

  async function request(path, options) {
    var token = await getToken();
    var config = Object.assign({ method: "GET", credentials: "same-origin", headers: {} }, options || {});
    var method = String(config.method || "GET").trim().toUpperCase();
    if (!config.cache && method === "GET") {
      config.cache = "no-store";
    }
    config.headers = Object.assign({}, config.headers, { Accept: "application/json", "__RequestVerificationToken": token });
    if (method === "GET") {
      config.headers["Cache-Control"] = config.headers["Cache-Control"] || "no-cache, no-store, max-age=0";
      config.headers.Pragma = config.headers.Pragma || "no-cache";
    }
    if (config.body && !config.headers["Content-Type"]) {
      config.headers["Content-Type"] = "application/json";
    }
    var response = await fetch(path, config);
    if (!response.ok) {
      var text = "";
      try {
        text = await response.text();
      } catch (error) {
        text = "";
      }
      throw new Error((response.status + " " + response.statusText + (text ? ": " + text : "")).trim());
    }
    if (response.status === 204) {
      return {};
    }
    var responseText = await response.text();
    return responseText ? JSON.parse(responseText) : {};
  }

  function createRuntimeDiagnostics() {
    return {
      critical: [],
      warnings: [],
      seen: {}
    };
  }

  function addRuntimeDiagnostic(diagnostics, severity, item) {
    if (!diagnostics || !item) {
      return;
    }
    var bucketName = severity === "critical" ? "critical" : "warnings";
    var key = [
      bucketName,
      item.code || "",
      item.dataset || "",
      item.branchSlug || "",
      item.regionSlug || "",
      item.detail || ""
    ].join("|");
    if (diagnostics.seen[key]) {
      return;
    }
    diagnostics.seen[key] = true;
    diagnostics[bucketName].push(item);
  }

  function classifyDatasetFailure(error) {
    var message = String(error && error.message || "").trim();
    if (!message) {
      return "unknown";
    }
    if (message.indexOf("401") !== -1 || message.indexOf("Unauthorized") !== -1) {
      return "unauthorized";
    }
    if (message.indexOf("403") !== -1 || message.indexOf("Forbidden") !== -1) {
      return "forbidden";
    }
    if (message.indexOf("404") !== -1) {
      return "not-found";
    }
    if (message.indexOf("500") !== -1) {
      return "server-error";
    }
    return "request-failed";
  }

  async function getAll(path, options) {
    options = options || {};
    var rows = [];
    var next = path;
    var pageCount = 0;
    var maxPages = parseInteger(options.maxPages, GETALL_MAX_PAGES);
    var visited = {};
    while (next) {
      if (visited[next]) {
        console.warn("QFU runtime pagination guard tripped", options.datasetName || path, {
          reason: "repeated-nextlink",
          pageCount: pageCount,
          nextLink: next
        });
        if (typeof options.onGuardTrip === "function") {
          options.onGuardTrip({
            type: "repeated-nextlink",
            pageCount: pageCount,
            nextLink: next
          });
        }
        break;
      }
      if (pageCount >= maxPages) {
        console.warn("QFU runtime pagination guard tripped", options.datasetName || path, {
          reason: "max-pages",
          pageCount: pageCount,
          maxPages: maxPages,
          nextLink: next
        });
        if (typeof options.onGuardTrip === "function") {
          options.onGuardTrip({
            type: "max-pages",
            pageCount: pageCount,
            maxPages: maxPages,
            nextLink: next
          });
        }
        break;
      }
      visited[next] = true;
      pageCount += 1;
      var payload = await request(next);
      rows = rows.concat(payload.value || []);
      next = payload["@odata.nextLink"] || "";
    }
    return rows;
  }

  async function safeGetAll(path, datasetName, diagnostics, options) {
    options = options || {};
    try {
      var rows = await getAll(path, {
        datasetName: datasetName,
        maxPages: options.maxPages || GETALL_MAX_PAGES,
        onGuardTrip: function (guardInfo) {
          addRuntimeDiagnostic(diagnostics, options.critical === false ? "warning" : "critical", {
            code: "pagination-guard",
            dataset: datasetName,
            branchSlug: options.branchSlug || "",
            regionSlug: options.regionSlug || "",
            detail: "Pagination guard tripped for " + datasetName + " (" + guardInfo.type + ")."
          });
        }
      });
      if (options.top && rows.length >= options.top) {
        console.warn("QFU runtime dataset may be truncated", datasetName, {
          configuredTop: options.top,
          rowCount: rows.length,
          path: path
        });
        addRuntimeDiagnostic(diagnostics, "warning", {
          code: "top-cap-hit",
          dataset: datasetName,
          branchSlug: options.branchSlug || "",
          regionSlug: options.regionSlug || "",
          detail: datasetName + " reached the configured $top cap of " + options.top + " and may be truncated."
        });
      }
      return rows;
    } catch (error) {
      var failureType = classifyDatasetFailure(error);
      console.warn("QFU runtime query failed", datasetName, failureType, path, error);
      addRuntimeDiagnostic(diagnostics, options.critical === false ? "warning" : "critical", {
        code: "dataset-failed",
        dataset: datasetName,
        branchSlug: options.branchSlug || "",
        regionSlug: options.regionSlug || "",
        failureType: failureType,
        detail: datasetName + " failed (" + failureType + ")."
      });
      return [];
    }
  }

  function quoteLastTouchedCalendarDate(record) {
    var lastTouched = parseDate(record && record.qfu_lasttouchedon);

  function quoteNeedsFollowupAttention(record, today) {
    var nextFollowup = parseBusinessDate(record && record.qfu_nextfollowup);
    var lastTouched = parseDate(record && record.qfu_lasttouchedon);
    return !lastTouched || !nextFollowup || nextFollowup < today;

  function rankQuoteFollowupGap(record, today) {
    var nextFollowup = parseBusinessDate(record && record.qfu_nextfollowup);
    var lastTouchedDate = quoteLastTouchedCalendarDate(record);
    var createdOn = quoteCreatedMoment(record);
    return {
      noTouch: lastTouchedDate ? 0 : 1,
      overdueFollowupDays: nextFollowup && nextFollowup < today ? daysBetween(today, nextFollowup) : 0,
      unscheduled: nextFollowup ? 0 : 1,
      staleTouchDays: lastTouchedDate ? daysBetween(today, lastTouchedDate) : 9999,
      createdOnValue: createdOn ? createdOn.getTime() : 0,

    };
  }

  function compareQuotesForFollowup(left, right, today) {
    var leftRank = rankQuoteFollowupGap(left, today);
    var rightRank = rankQuoteFollowupGap(right, today);
    if (rightRank.noTouch !== leftRank.noTouch) {
      return rightRank.noTouch - leftRank.noTouch;
    }
    if (rightRank.overdueFollowupDays !== leftRank.overdueFollowupDays) {
      return rightRank.overdueFollowupDays - leftRank.overdueFollowupDays;
    }
    if (rightRank.unscheduled !== leftRank.unscheduled) {
      return rightRank.unscheduled - leftRank.unscheduled;
    }
    if (rightRank.staleTouchDays !== leftRank.staleTouchDays) {
      return rightRank.staleTouchDays - leftRank.staleTouchDays;
    }
    if (leftRank.createdOnValue !== rightRank.createdOnValue) {
      return leftRank.createdOnValue - rightRank.createdOnValue;
    }
    if (rightRank.amount !== leftRank.amount) {
      return rightRank.amount - leftRank.amount;
    }
    return String(left && left.qfu_quotenumber || "").localeCompare(String(right && right.qfu_quotenumber || ""));
  }

  function selectUnfollowedQuotes(openQuotes, today) {
    var attentionRows = (openQuotes || []).filter(function (record) {
      return quoteNeedsFollowupAttention(record, today);
    });
    var selectedRows = attentionRows.length ? attentionRows : (openQuotes || []).slice();
    return {
      records: selectedRows.sort(function (left, right) {
        return compareQuotesForFollowup(left, right, today);
      }),
      note: attentionRows.length

        : "Fallback to oldest open quotes when no follow-up gaps are currently flagged"

  function buildQuoteLineRow(record) {

    var hasUnitPrice = !(record.qfu_unitprice === null || record.qfu_unitprice === undefined || String(record.qfu_unitprice).trim() === "");
    var unitPrice = hasUnitPrice ? toNumber(record.qfu_unitprice) : null;
    var lineTotal = toNumber(record.qfu_linetotal || record.qfu_amount);

        code: "budget-target-mismatch",
        severity: "warning",
        dataset: "budget-lineage",
        detail: branch.code + " " + monthLabel + " target mismatch: qfu_budgetarchive " + formatCurrency(archiveTargetRaw) + " vs qfu_budget " + formatCurrency(budgetTargetRaw) + "."
      });
    }

    if (budgetValuePresent(archiveTargetRaw) && budgetValuePresent(summaryTargetRaw) && budgetValuesDiffer(archiveTargetRaw, summaryTargetRaw)) {
      issues.push({
        code: "budget-target-mismatch",
        severity: "warning",
        dataset: "budget-lineage",
        detail: branch.code + " " + monthLabel + " target mismatch: qfu_budgetarchive " + formatCurrency(archiveTargetRaw) + " vs qfu_branchdailysummary " + formatCurrency(summaryTargetRaw) + "."
      });
    }

    if (budgetValuePresent(budgetActualRaw) && budgetValuePresent(summaryActualRaw) && budgetValuesDiffer(budgetActualRaw, summaryActualRaw) && !summaryActualLaggingBehindBudget && !config.budgetRowHasActual) {
      issues.push({

      });
    }

    if (!budgetValuePresent(archiveTargetRaw) && !budgetValuePresent(summaryTargetRaw) && !budgetValuePresent(budgetTargetRaw)) {
      issues.push({
        code: "budget-target-missing",
        severity: "critical",
        dataset: "budget-lineage",
        detail: branch.code + " has no trustworthy " + monthLabel + " target in qfu_budgetarchive, qfu_branchdailysummary, or qfu_budget."
      });
    }

    return {
      hasIssues: issues.length > 0,
      hasCriticalIssue: issues.some(function (item) { return item.severity === "critical"; }),
      issues: issues
    };
  }

    var historyDuplicates = duplicates.filter(function (duplicate) {

        branchSlug: branch && branch.slug,
        historyDuplicateCount: historyDuplicates.length,
        sampleKeys: duplicateIdentityPreview(historyDuplicates)

    if (!liveDuplicates.length) {

    console.warn("QFU duplicate operational rows detected; collapsing to the preferred row", {

      branchSlug: branch && branch.slug,

  function buildOwnerRows(queueRows, overdueQuoteRows, overdueBackorders) {

        byOwner[key] = {
          owner: key,
          quoteCount: 0,
          overdueQuotes: 0,
          quoteValue: 0,
          overdueQuoteValue: 0,
          oldestQuoteAge: 0,
          unscheduledCount: 0,
          lateBackorders: 0,
          riskScore: 0
        };
      }
      byOwner[key].quoteCount += 1;
      byOwner[key].quoteValue += toNumber(String(row.value).replace(/[^0-9.-]/g, ""));
      byOwner[key].oldestQuoteAge = Math.max(byOwner[key].oldestQuoteAge, parseInteger(row.daysOverdue, 0));
      if (String(row.nextFollowup || "").toLowerCase().indexOf("unscheduled") !== -1) {
        byOwner[key].unscheduledCount += 1;
      }
    });

    (overdueQuoteRows || []).forEach(function (row) {
      var key = String(row.owner || "Unassigned").trim();
      if (!byOwner[key]) {
        byOwner[key] = {
          owner: key,
          quoteCount: 0,
          overdueQuotes: 0,
          quoteValue: 0,
          overdueQuoteValue: 0,
          oldestQuoteAge: 0,
          unscheduledCount: 0,
          lateBackorders: 0,
          riskScore: 0
        };
      }
      byOwner[key].overdueQuotes += 1;
      byOwner[key].overdueQuoteValue += toNumber(String(row.value).replace(/[^0-9.-]/g, ""));
      byOwner[key].oldestQuoteAge = Math.max(byOwner[key].oldestQuoteAge, parseInteger(row.daysOverdue, 0));
    });

    (overdueBackorders || []).forEach(function (row) {
      var key = String(row.cssr || "Unassigned").trim();
      if (!byOwner[key]) {
        byOwner[key] = {
          owner: key,
          quoteCount: 0,
          overdueQuotes: 0,
          quoteValue: 0,
          overdueQuoteValue: 0,
          oldestQuoteAge: 0,
          unscheduledCount: 0,
          lateBackorders: 0,
          riskScore: 0
        };
      }
      byOwner[key].lateBackorders += 1;
    });

    return Object.keys(byOwner).map(function (key) {
      byOwner[key].riskScore = byOwner[key].overdueQuotes + byOwner[key].lateBackorders;
      return byOwner[key];
    }).sort(function (left, right) {
      if (right.riskScore !== left.riskScore) {
        return right.riskScore - left.riskScore;
      }
      if (right.overdueQuoteValue !== left.overdueQuoteValue) {
        return right.overdueQuoteValue - left.overdueQuoteValue;
      }
      if (right.oldestQuoteAge !== left.oldestQuoteAge) {
        return right.oldestQuoteAge - left.oldestQuoteAge;
      }
      return right.quoteValue - left.quoteValue;

  function buildCssrLeaderboardRows(overdueBackorders, today) {
    var byCssr = {};

    (overdueBackorders || []).forEach(function (record) {

      if (backorderHasLeaderboardAgeOutlier(record, ageReference)) {

      row.overdueBackorderCount = orderCount || row.overdueBackorderCount;

  function financeVarianceHistoryForBranch(rows, branch, varianceSlug) {
    var slug = String(varianceSlug || "").trim().toLowerCase();

      if (record.qfu_branchslug !== branch.slug || String(record.qfu_varianceslug || "").trim().toLowerCase() !== slug) {

      var year = parseInteger(record.qfu_year, 0);
      var month = parseInteger(record.qfu_month, 0);
      if (!year || !month) {

      }
      var key = year + "-" + String(month).padStart(2, "0");
      var existing = latestByMonth[key];
      if (!existing || (latestDate(record.qfu_lastupdated, record.modifiedon, record.createdon) || 0) > (latestDate(existing.qfu_lastupdated, existing.modifiedon, existing.createdon) || 0)) {
        latestByMonth[key] = record;

  function odataString(value) {

  function withFilter(path, filter) {
    if (!filter) {
      return path;
    }
    return path + (path.indexOf("?") >= 0 ? "&" : "?") + "$filter=" + encodeURIComponent(filter);
  }

  function readSessionRowsCache(cacheKey, ttlMs) {
    if (!cacheKey || !ttlMs || typeof sessionStorage === "undefined") {
      return null;
    }
    try {
      var raw = sessionStorage.getItem(cacheKey);
      if (!raw) {
        return null;
      }
      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed.ts !== "number" || !Array.isArray(parsed.rows)) {
        return null;
      }
      if ((Date.now() - parsed.ts) > ttlMs) {
        return null;
      }
      return parsed.rows;
    } catch (error) {
      return null;
    }
  }

  function writeSessionRowsCache(cacheKey, rows, allowEmptyCache) {
    if (!cacheKey || typeof sessionStorage === "undefined") {
      return;
    }
    if (!allowEmptyCache && (!Array.isArray(rows) || !rows.length)) {
      return;
    }
    try {
      sessionStorage.setItem(cacheKey, JSON.stringify({
        ts: Date.now(),
        rows: rows
      }));
    } catch (error) {
      // Ignore quota and serialization failures.
    }
  }

  function isLegacyRuntimeCacheKey(key) {
    return !!(key && key.indexOf("qfu-runtime-") === 0 && key.indexOf("qfu-runtime-" + RUNTIME_CACHE_VERSION + ":") !== 0);
  }

  function purgeLegacyRuntimeCacheKeys() {
    if (typeof sessionStorage === "undefined") {
      return;
    }
    try {
      var keysToDelete = [];
      for (var index = 0; index < sessionStorage.length; index += 1) {
        var key = sessionStorage.key(index);
        if (isLegacyRuntimeCacheKey(key)) {
          keysToDelete.push(key);
        }
      }
      keysToDelete.forEach(function (key) {
        sessionStorage.removeItem(key);
      });
    } catch (purgeErr) {
      /* ignore session storage access failures */
    }
  }

  async function safeGetAllCached(path, datasetName, diagnostics, options) {
    options = options || {};
    var cacheKey = options.cacheKey || "";
    var cacheTtlMs = options.cacheTtlMs || 0;
    var cachedRows = readSessionRowsCache(cacheKey, cacheTtlMs);
    if (cachedRows) {
      return cachedRows;
    }
    var rows = await safeGetAll(path, datasetName, diagnostics, options);
    if (cacheKey && cacheTtlMs) {
      writeSessionRowsCache(cacheKey, rows, !!options.allowEmptyCache);
    }
    return rows;
  }

  function branchIdentityOdataFilter(branch, codeFieldName, slugFieldName) {
    var clauses = [];
    var branchCode = String(branch && branch.code || "").trim();
    var branchSlug = String(branch && branch.slug || "").trim();
    if (codeFieldName && branchCode) {
      clauses.push(codeFieldName + " eq " + odataString(branchCode));
    }
    if (slugFieldName && branchSlug) {
      clauses.push(slugFieldName + " eq " + odataString(branchSlug));
    }
    if (!clauses.length) {
      return "";
    }
    return clauses.length === 1 ? clauses[0] : "(" + clauses.join(" or ") + ")";
  }

  function freightServerFilter(baseFilter, context) {
    var clauses = [];
    var params = new URLSearchParams(window.location.search);
    var search = String(params.get("search") || "").trim();
    var item = String(params.get("item") || "").trim();
    if (baseFilter) {
      clauses.push("(" + baseFilter + ")");
    }
    if (!(context && context.pageType === "detail" && context.viewKey === "freight-worklist")) {
      return clauses.join(" and ");
    }
    if (item) {
      clauses.push("(qfu_sourceid eq " + odataString(item) + ")");
      return clauses.join(" and ");
    }
    if (search.length >= 3) {
      var searchValue = odataString(search);
      clauses.push("(" + [
        "contains(qfu_reference," + searchValue + ")",
        "contains(qfu_trackingnumber," + searchValue + ")",
        "contains(qfu_pronumber," + searchValue + ")",
        "contains(qfu_invoicenumber," + searchValue + ")",
        "contains(qfu_sender," + searchValue + ")",
        "contains(qfu_destination," + searchValue + ")"
      ].join(" or ") + ")");
    }
    return clauses.join(" and ");
  }

  function snapshotDayKey(value) {
    var parsed = parseDate(value);
    if (!parsed) {

    return parsed.getFullYear() + "-" + String(parsed.getMonth() + 1).padStart(2, "0") + "-" + String(parsed.getDate()).padStart(2, "0");
  }

  function normalizeMarginIdentityValue(value) {
    var text = String(value == null ? "" : value).trim().toLowerCase().replace(/\s+/g, " ");

    return text;

  function latestExceptionSnapshotRows(rows, branch) {

  function setDeliveryCommentDirtyState(row) {

    var status = row.querySelector("[data-qfu-delivery-status]");
    if (!textarea) {

    }
    var currentValue = String(textarea.value || "");
    var originalValue = String(textarea.getAttribute("data-original-value") || "");
    var isDirty = currentValue !== originalValue;
    if (dirty) {
      dirty.hidden = !isDirty;
    }
    if (button) {
      button.disabled = !isDirty;
    }
    if (status && isDirty) {
      status.textContent = "";
    }

  async function copyText(value) {
    var text = String(value || "");
    if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
      await navigator.clipboard.writeText(text);
      return;
    }
    var helper = document.createElement("textarea");
    helper.value = text;
    helper.setAttribute("readonly", "readonly");
    helper.style.position = "fixed";
    helper.style.opacity = "0";
    document.body.appendChild(helper);
    helper.select();
    document.execCommand("copy");
    document.body.removeChild(helper);
  }

  function downloadText(filename, text, mimeType) {
    var blob = new Blob([String(text || "")], { type: mimeType || "text/plain;charset=utf-8" });
    var url = window.URL.createObjectURL(blob);
    var link = document.createElement("a");
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    window.setTimeout(function () {
      window.URL.revokeObjectURL(url);
    }, 1000);
  }

  async function saveDeliveryComment(root, button) {
    var row = button.closest("[data-qfu-delivery-row]");
    var recordId = button.getAttribute("data-qfu-save-delivery-comment");
    var textarea = row ? row.querySelector("[data-qfu-delivery-comment]") : null;
    var status = row ? row.querySelector("[data-qfu-delivery-status]") : null;
    if (!row || !recordId || !textarea) {
      return;
    }

    var commentValue = String(textarea.value || "");
    var originalValue = String(textarea.getAttribute("data-original-value") || "");
    if (commentValue === originalValue) {
      return;
    }

    var payload = {
      qfu_comment: commentValue,
      qfu_commentupdatedon: new Date().toISOString(),
      qfu_commentupdatedbyname: currentPortalUserName(root)
    };

    if (status) {
      status.textContent = "Saving...";
    }

    await patchRecord("qfu_deliverynotpgis", recordId, payload);
    await rerenderAfterSave(root, "success", "Delivery comment saved.");
  }

  async function saveDeliveryOrderComment(root, button) {
    var row = button.closest("[data-qfu-delivery-row]");

      return String(value || "").trim();

      return !!value;
    });
    var textarea = row ? row.querySelector("[data-qfu-delivery-comment]") : null;
    var status = row ? row.querySelector("[data-qfu-delivery-status]") : null;
    if (!row || !recordIds.length || !textarea) {
      return;
    }

    var commentValue = String(textarea.value || "");
    var originalValue = String(textarea.getAttribute("data-original-value") || "");
    if (commentValue === originalValue) {
      return;
    }

    var payload = {
      qfu_comment: commentValue,

      qfu_commentupdatedbyname: currentPortalUserName(root)

  function bindDeliveryNotPgiActions(root, branch) {
    root.querySelectorAll("[data-qfu-delivery-comment]").forEach(function (textarea) {
      var row = textarea.closest("[data-qfu-delivery-row]");
      setDeliveryCommentDirtyState(row);
      textarea.addEventListener("input", function () {
        setDeliveryCommentDirtyState(row);
      });
    });

    root.querySelectorAll("[data-qfu-save-delivery-comment]").forEach(function (button) {
      button.addEventListener("click", async function () {
        if (button.disabled) {
          return;
        }
        button.disabled = true;
        try {
          await saveDeliveryComment(root, button);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Delivery comment save failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });

    root.querySelectorAll("[data-qfu-save-delivery-order-comment]").forEach(function (button) {
      button.addEventListener("click", async function () {
        if (button.disabled) {
          return;
        }
        button.disabled = true;
        try {
          await saveDeliveryOrderComment(root, button);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Order comment save failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });

    root.querySelectorAll("[data-qfu-copy-delivery-list]").forEach(function (button) {
      button.addEventListener("click", async function () {
        var originalLabel = button.textContent;
        button.disabled = true;
        try {
          await copyText(buildDeliveryNotPgiOrderDelimited(filteredDeliveryNotPgiOrderRows(branch), deliveryNotPgiOrderVisibleColumns(), "\t"));
          button.textContent = "Copied";
          window.setTimeout(function () {
            if (document.body.contains(button)) {
              button.textContent = originalLabel;
              button.disabled = false;
            }
          }, 1200);
        } catch (error) {
          button.textContent = "Copy Failed";
          window.setTimeout(function () {
            if (document.body.contains(button)) {
              button.textContent = originalLabel;
              button.disabled = false;
            }
          }, 1600);
        }
      });
    });

    root.querySelectorAll("[data-qfu-export-delivery-csv]").forEach(function (button) {
      button.addEventListener("click", function () {
        var rows = filteredDeliveryNotPgiOrderRows(branch);
        var csvText = buildDeliveryNotPgiOrderDelimited(rows, deliveryNotPgiOrderVisibleColumns(), ",");
        downloadText((branch.slug || "branch") + "-ready-to-ship-not-pgid.csv", csvText, "text/csv;charset=utf-8");
      });
    });
  }

  function currentFreightFilters() {
    var params = new URLSearchParams(window.location.search);

    var maxAmount = String(params.get("maxAmount") || "").trim();
    var rawStatus = String(params.get("status") || "").trim();
    var rawDateFrom = String(params.get("dateFrom") || "").trim();
    var rawDateTo = String(params.get("dateTo") || "").trim();
    return {
      carrier: String(params.get("carrier") || "").trim(),
      status: rawStatus ? freightStatusLabel(rawStatus) : "",

      service: String(params.get("service") || "").trim(),
      direction: String(params.get("direction") || "").trim(),
      includeArchived: params.get("archived") === "1",
      minAmount: /^\d+(\.\d+)?$/.test(minAmount) ? minAmount : "",
      maxAmount: /^\d+(\.\d+)?$/.test(maxAmount) ? maxAmount : "",
      sort: normalizeFreightLedgerSort(params.get("sort")),
      dateField: normalizeFreightDateField(params.get("dateField")),
      dateFrom: isValidDateInput(rawDateFrom) ? rawDateFrom : "",
      dateTo: isValidDateInput(rawDateTo) ? rawDateTo : "",
      search: String(params.get("search") || "").trim(),

    };

  function activeFreightFilterParams(filters) {
    var params = {};
    if (filters.carrier) { params.carrier = filters.carrier; }
    if (filters.status) { params.status = filters.status; }
    if (filters.owner) { params.owner = filters.owner; }
    if (filters.billType) { params.billType = filters.billType; }
    if (filters.service) { params.service = filters.service; }
    if (filters.direction) { params.direction = filters.direction; }
    if (filters.includeArchived) { params.archived = "1"; }
    if (filters.minAmount) { params.minAmount = filters.minAmount; }
    if (filters.maxAmount) { params.maxAmount = filters.maxAmount; }
    if (filters.sort && filters.sort !== "value-desc") { params.sort = filters.sort; }
    if (filters.dateField && filters.dateField !== "invoice") { params.dateField = filters.dateField; }
    if (filters.dateFrom) { params.dateFrom = filters.dateFrom; }
    if (filters.dateTo) { params.dateTo = filters.dateTo; }
    if (filters.search) { params.search = filters.search; }
    if (filters.item) { params.item = filters.item; }
    return params;
  }

  function uniqueFreightValues(rows, selector) {
    var seen = {};
    return (rows || []).map(function (row) {
      return typeof selector === "function" ? selector(row) : row[selector];
    }).map(function (value) {
      return String(value || "").trim();
    }).filter(function (value) {
      if (!value) {
        return false;
      }
      var key = value.toLowerCase();
      if (seen[key]) {
        return false;
      }
      seen[key] = true;
      return true;
    }).sort(function (left, right) {
      return String(left || "").localeCompare(String(right || ""));
    });
  }

  function applyFreightFilters(rows, filters) {
    var minAmount = filters.minAmount ? toNumber(filters.minAmount) : null;
    var maxAmount = filters.maxAmount ? toNumber(filters.maxAmount) : null;
    var dateField = normalizeFreightDateField(filters.dateField);
    var dateFrom = filters.dateFrom ? dateInputStart(filters.dateFrom) : null;
    var dateTo = filters.dateTo ? dateInputEnd(filters.dateTo) : null;
    var search = normalizeConfigKey(filters.search);
    return sortFreightLedgerRows((rows || []).filter(function (row) {
      if (!filters.includeArchived && row.archived) {
        return false;
      }
      if (filters.carrier && row.carrier !== filters.carrier) {
        return false;
      }
      if (filters.status && row.status !== filters.status) {
        return false;
      }
      if (filters.owner) {
        if (filters.owner === "Unowned") {
          if (row.ownerName) {
            return false;
          }
        } else if (row.owner !== filters.owner) {
          return false;
        }
      }
      if (filters.billType && row.billType !== filters.billType) {
        return false;
      }
      if (filters.service && row.service !== filters.service) {
        return false;
      }
      if (filters.direction && row.direction !== filters.direction) {
        return false;
      }
      if (minAmount !== null && row.totalAmountNumber < minAmount) {
        return false;
      }
      if (maxAmount !== null && row.totalAmountNumber > maxAmount) {
        return false;
      }
      if (dateFrom || dateTo) {
        var rowDateValue = freightDateValue(row, dateField, 0);
        if (!rowDateValue) {
          return false;
        }
        if (dateFrom && rowDateValue < dateFrom.getTime()) {
          return false;
        }
        if (dateTo && rowDateValue > dateTo.getTime()) {
          return false;
        }
      }
      if (search && row.searchText.indexOf(search) === -1) {
        return false;
      }
      if (filters.item && row.sourceId !== filters.item) {
        return false;
      }
      return true;
    }), filters.sort, dateField);
  }

  function filteredFreightRows(branch) {
    return applyFreightFilters((branch && branch.workspace && branch.workspace.freightRows) || [], currentFreightFilters());
  }

  function buildFreightDelimited(rows, columns, delimiter) {
    var lines = [];
    lines.push(columns.map(function (column) { return delimiter === "," ? csvEscape(column.label) : column.label; }).join(delimiter));
    (rows || []).forEach(function (row) {
      lines.push(columns.map(function (column) {
        var value = typeof column.value === "function" ? column.value(row) : row[column.value];
        return delimiter === "," ? csvEscape(value) : String(value == null ? "" : value).replace(/\r?\n/g, " ");
      }).join(delimiter));
    });
    return lines.join("\r\n");
  }

  function renderFreightStatusOptions(selectedValue) {

    }
    return options.map(function (option) {

    }).join("");

  function freightQueueHealthState(freight, latestImportRow) {
    if (freight && freight.isStale) {
      return {
        label: "Stale feed",
        tone: "warning",
        detail: freight.staleLabel || "The latest successful freight import is older than the expected cadence."
      };
    }
    if (latestImportRow && !successfulImportStatus(latestImportRow.qfu_status)) {
      return {
        label: "Needs review",
        tone: "warning",
        detail: "The latest freight batch did not finish with a healthy status."
      };
    }
    if (latestImportRow) {
      return {
        label: "Stable",
        tone: "good",
        detail: "Automatic inbox imports are landing cleanly for this branch."
      };
    }
    return {
      label: "Awaiting first import",
      tone: "neutral",
      detail: "The freight inbox is enabled, but this branch does not have a completed freight batch yet."
    };
  }

hase0-inline-button qfu-phase0-freight-action qfu-phase0-freight-action--ghost" type="button" data-qfu-toggle-freight-archive="' + escapeHtml(row.id) + '" data-qfu-archive-state="' + escapeHtml(row.archived ? "1" : "0") + '">' + escapeHtml(row.archived ? "Unarchive" : "Archive") + '</button></div><div class="qfu-phase0-freight-workbench__statusline"><span class="qfu-phase0-freight-status-message" data-qfu-freight-status-message>' + escapeHtml(row.archived ? ('Archived ' + row.archivedOn) : 'Visible in active ledger') + '</span><span class="qfu-phase0-freight-dirty" data-qfu-freight-dirty hidden>Unsaved changes</span></div><details class="qfu-phase0-ledger-drawer"><summary class="qfu-phase0-ledger-drawer__summary"><strong>Row details</strong><span class="qfu-phase0-ledger-drawer__hint">source / debug</span></summary><div class="qfu-phase0-ledger-drawer__body"><div class="qfu-phase0-admin-subtext">Source Id: ' + escapeHtml(row.sourceId) + '</div><div class="qfu-phase0-admin-subtext">Branch import batch: ' + escapeHtml(row.record.qfu_importbatchid || "None") + '</div><div class="qfu-phase0-admin-subtext">' + escapeHtml(row.chargebreakdowntext || "No charge breakdown text") + '</div><div class="qfu-phase0-actions"><a class="qfu-phase0-secondary-action" href="' + escapeHtml(row.detailHref || detailHref(branch, "freight-worklist")) + '">Link to This Row</a></div></div></details></div></td></tr>';

  function setFreightDirtyState(row) {
    if (!row) {
      return;
    }
    var note = row.querySelector("[data-qfu-freight-comment]");
    var statusSelect = row.querySelector("[data-qfu-freight-status-select]");
    var dirty = row.querySelector("[data-qfu-freight-dirty]");
    var button = row.querySelector("[data-qfu-save-freight]");
    var status = row.querySelector("[data-qfu-freight-status-message]");
    if (!note || !statusSelect || !button) {
      return;
    }
    var noteDirty = String(note.value || "") !== String(note.getAttribute("data-original-value") || "");
    var statusDirty = String(statusSelect.value || "") !== String(statusSelect.getAttribute("data-original-value") || "");
    var isDirty = noteDirty || statusDirty;
    button.disabled = !isDirty;
    if (dirty) {
      dirty.hidden = !isDirty;
    }
    if (status && isDirty) {
      status.textContent = "";
    }
  }

  async function saveFreightRow(root, button) {
    var row = button.closest("[data-qfu-freight-row]");
    var recordId = button.getAttribute("data-qfu-save-freight");
    var note = row ? row.querySelector("[data-qfu-freight-comment]") : null;
    var statusSelect = row ? row.querySelector("[data-qfu-freight-status-select]") : null;
    var status = row ? row.querySelector("[data-qfu-freight-status-message]") : null;
    if (!row || !recordId || !note || !statusSelect) {
      return;
    }

    var payload = {
      qfu_status: String(statusSelect.value || "Unreviewed").trim() || "Unreviewed",
      qfu_comment: String(note.value || ""),
      qfu_commentupdatedon: new Date().toISOString(),
      qfu_commentupdatedbyname: currentPortalUserName(root),
      qfu_lastactivityon: new Date().toISOString()
    };
    if (status) {
      status.textContent = "Saving...";
    }
    await patchRecord("qfu_freightworkitems", recordId, payload);
    await rerenderAfterSave(root, "success", "Freight row updated.");
  }

  async function takeFreightOwnership(root, button) {
    var recordId = button.getAttribute("data-qfu-take-freight");
    if (!recordId) {
      return;
    }
    var now = new Date().toISOString();
    var userName = currentPortalUserName(root);
    await patchRecord("qfu_freightworkitems", recordId, {
      qfu_ownername: userName,
      qfu_owneridentifier: userName,
      qfu_claimedon: now,
      qfu_lastactivityon: now
    });
    await rerenderAfterSave(root, "success", "Freight row claimed.");
  }

  async function releaseFreightOwnership(root, button) {
    var recordId = button.getAttribute("data-qfu-release-freight");
    if (!recordId) {
      return;
    }
    await patchRecord("qfu_freightworkitems", recordId, {
      qfu_ownername: "",
      qfu_owneridentifier: "",
      qfu_claimedon: null,
      qfu_lastactivityon: new Date().toISOString()
    });
    await rerenderAfterSave(root, "success", "Freight ownership released.");
  }

  async function toggleFreightArchive(root, button) {
    var recordId = button.getAttribute("data-qfu-toggle-freight-archive");
    var archiveState = button.getAttribute("data-qfu-archive-state") === "1";
    if (!recordId) {
      return;
    }
    await patchRecord("qfu_freightworkitems", recordId, {
      qfu_isarchived: !archiveState,
      qfu_archivedon: archiveState ? null : new Date().toISOString(),
      qfu_lastactivityon: new Date().toISOString()
    });
    await rerenderAfterSave(root, "success", archiveState ? "Freight row restored to the active queue." : "Freight row archived.");
  }

  function bindFreightWorklistActions(root, branch) {
    root.querySelectorAll("[data-qfu-freight-comment], [data-qfu-freight-status-select]").forEach(function (element) {
      var row = element.closest("[data-qfu-freight-row]");
      setFreightDirtyState(row);
      element.addEventListener("input", function () {
        setFreightDirtyState(row);
      });
      element.addEventListener("change", function () {
        setFreightDirtyState(row);
      });
    });

    root.querySelectorAll("[data-qfu-save-freight]").forEach(function (button) {
      button.addEventListener("click", async function () {
        if (button.disabled) {
          return;
        }
        button.disabled = true;
        try {
          await saveFreightRow(root, button);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Freight save failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });

    root.querySelectorAll("[data-qfu-take-freight]").forEach(function (button) {
      button.addEventListener("click", async function () {
        button.disabled = true;
        try {
          await takeFreightOwnership(root, button);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Take ownership failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });

    root.querySelectorAll("[data-qfu-release-freight]").forEach(function (button) {
      button.addEventListener("click", async function () {
        button.disabled = true;
        try {
          await releaseFreightOwnership(root, button);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Release ownership failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });

    root.querySelectorAll("[data-qfu-toggle-freight-archive]").forEach(function (button) {
      button.addEventListener("click", async function () {
        button.disabled = true;
        try {
          await toggleFreightArchive(root, button);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Archive action failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });

    root.querySelectorAll("[data-qfu-copy-freight-list]").forEach(function (button) {
      button.addEventListener("click", async function () {
        var originalLabel = button.textContent;
        button.disabled = true;
        try {
          await copyText(buildFreightDelimited(filteredFreightRows(branch), freightCsvColumns(), "\t"));
          button.textContent = "Copied";
          window.setTimeout(function () {
            if (document.body.contains(button)) {
              button.textContent = originalLabel;
              button.disabled = false;
            }
          }, 1200);
        } catch (error) {
          button.textContent = "Copy Failed";
          window.setTimeout(function () {
            if (document.body.contains(button)) {
              button.textContent = originalLabel;
              button.disabled = false;
            }
          }, 1600);
        }
      });
    });

    root.querySelectorAll("[data-qfu-export-freight-csv]").forEach(function (button) {
      button.addEventListener("click", function () {
        var csvText = buildFreightDelimited(filteredFreightRows(branch), freightCsvColumns(), ",");
        downloadText((branch.slug || "branch") + "-freight-ledger.csv", csvText, "text/csv;charset=utf-8");
      });
    });
  }

  function buildAnalyticsQuoteLine(record) {
