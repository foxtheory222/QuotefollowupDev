<script>
(function () {
  "use strict";

  /*
   * QFU runtime conventions:
   * - INVERTED ENVIRONMENT: qfu_isactive false = active, true = inactive.
   * - Never parse business dates with raw new Date(isoWithZ) semantics; use parseBusinessDate/buildLocalCalendarDate.
   * - Current-month budget pace comes from qfu_budget; monthly targets come from qfu_budgetarchive.
   * - qfu_budgetarchive logical identity resolves by branch + month + fiscal year before qfu_sourceid.
   * - qfu_deliverynotpgi Power Pages behavior is reader/comment PATCH only; the exact base-row writer remains unproven.
   */
  var ENVIRONMENT_NAME = "Applied Canada Operations Hub";
  var DETAIL_PAGE_SIZE = 25;
  var DASHBOARD_PAGE_SIZE = 10;
  var DEFAULT_STALE_HOURS = 36;
  var DELIVERY_NOT_PGI_STALE_HOURS = 36;
  var DEFAULT_BUDGET_WARN = 85;
  var DEFAULT_QUOTE_WARN = 12;
  var DEFAULT_BACKORDER_WARN = 150;
  var GETALL_MAX_PAGES = 50;
  var QUOTES_FETCH_TOP = 5000;
  var BACKORDERS_FETCH_TOP = 5000;
  var BUDGETS_FETCH_TOP = 500;
  var BUDGET_ARCHIVES_FETCH_TOP = 500;
  var BRANCH_SUMMARY_FETCH_TOP = 500;
  var INGESTION_FETCH_TOP = 250;
  var DELIVERY_FETCH_TOP = 5000;
  var FLASH_MESSAGE = null;
  var RUNTIME_PROMISE = null;
  var RUNTIME_STATE = null;
  var OBSERVERS = new WeakMap();

  var REGION_ROUTE_MAP = {
    "southern-alberta": "/southern-alberta",
    "northern-alberta": "/northern-alberta",
    "saskatchewan": "/saskatchewan"
  };

  var BRANCH_ROUTE_MAP = {
    "4171-calgary": {
      code: "4171",
      name: "Calgary",
      routeRegionSlug: "southern-alberta",
      pageUrl: "/southern-alberta/4171-calgary"
    },
    "4172-lethbridge": {
      code: "4172",
      name: "Lethbridge",
      routeRegionSlug: "southern-alberta",
      pageUrl: "/southern-alberta/4172-lethbridge"
    },
    "4173-medicine-hat": {
      code: "4173",
      name: "Medicine Hat",
      routeRegionSlug: "southern-alberta",
      pageUrl: "/southern-alberta/4173-medicine-hat"
    }
  };

  var DETAIL_VIEWS = {
    "follow-up-queue": { title: "Follow-up Queue" },
    "quotes": { title: "Quotes" },
    "quote-detail": { title: "Quote Detail" },
    "overdue-quotes": { title: "Overdue Quotes" },
    "overdue-backorders": { title: "Back Orders" },
    "ready-to-ship-not-pgid": { title: "Ready to Ship, Not PGI'd" },
    "team-progress": { title: "Team Progress" },
    "workload": { title: "Workload" },
    "analytics": { title: "Analytics" }
  };

  var FISCAL_MONTHS = [
    { number: 7, shortLabel: "Jul", fullLabel: "July" },
    { number: 8, shortLabel: "Aug", fullLabel: "August" },
    { number: 9, shortLabel: "Sep", fullLabel: "September" },
    { number: 10, shortLabel: "Oct", fullLabel: "October" },
    { number: 11, shortLabel: "Nov", fullLabel: "November" },
    { number: 12, shortLabel: "Dec", fullLabel: "December" },
    { number: 1, shortLabel: "Jan", fullLabel: "January" },
    { number: 2, shortLabel: "Feb", fullLabel: "February" },
    { number: 3, shortLabel: "Mar", fullLabel: "March" },
    { number: 4, shortLabel: "Apr", fullLabel: "April" },
    { number: 5, shortLabel: "May", fullLabel: "May" },
    { number: 6, shortLabel: "Jun", fullLabel: "June" }
  ];

  function escapeHtml(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function toNumber(value) {
    var amount = Number(value);
    return Number.isFinite(amount) ? amount : 0;
  }

  function parseInteger(value, fallback) {
    var parsed = parseInt(value, 10);
    return Number.isFinite(parsed) ? parsed : fallback;
  }

  function buildLocalCalendarDate(year, monthIndex, dayOfMonth) {
    var parsed = new Date(year, monthIndex, dayOfMonth);
    if (Number.isNaN(parsed.getTime())) {
      return null;
    }
    if (parsed.getFullYear() !== year || parsed.getMonth() !== monthIndex || parsed.getDate() !== dayOfMonth) {
      return null;
    }
    return parsed;
  }

  function parseDate(value) {
    if (!value) {
      return null;
    }
    var parsed = new Date(value);
    return Number.isNaN(parsed.getTime()) ? null : parsed;
  }

  function parseBusinessDate(value) {
    if (!value) {
      return null;
    }
    if (value instanceof Date) {
      return buildLocalCalendarDate(value.getFullYear(), value.getMonth(), value.getDate());
    }
    var match = String(value).trim().match(/^(\d{4})-(\d{2})-(\d{2})(?:$|T)/);
    if (match) {
      return buildLocalCalendarDate(parseInt(match[1], 10), parseInt(match[2], 10) - 1, parseInt(match[3], 10));
    }
    var parsed = parseDate(value);
    return parsed ? buildLocalCalendarDate(parsed.getFullYear(), parsed.getMonth(), parsed.getDate()) : null;
  }

  function quoteCreatedMoment(record) {
    return parseDate(record && record.createdon) || parseBusinessDate(record && record.qfu_sourcedate);
  }

  function quoteSourceMoment(record) {
    return quoteCreatedMoment(record);
  }

  function summaryMoment(record) {
    return parseDate(record && record.qfu_lastcalculatedon) || parseBusinessDate(record && record.qfu_summarydate) || parseDate(record && record.createdon);
  }

  function exceptionSnapshotMoment(record) {
    return parseBusinessDate(record && record.qfu_snapshotdate) || parseDate(record && record.createdon);
  }

  function parseBoolean(value) {
    if (value === true || value === false) {
      return value;
    }
    var text = String(value == null ? "" : value).trim().toLowerCase();
    if (text === "true" || text === "1" || text === "yes") {
      return true;
    }
    if (text === "false" || text === "0" || text === "no") {
      return false;
    }
    return null;
  }

  // INVERTED ENVIRONMENT: qfu_isactive false = active, true = inactive.
  function budgetRowIsActive(record) {
    return parseBoolean(record && record.qfu_isactive) === false;
  }

  function latestDate() {
    var latest = null;
    for (var i = 0; i < arguments.length; i += 1) {
      var candidate = parseDate(arguments[i]);
      if (candidate && (!latest || candidate > latest)) {
        latest = candidate;
      }
    }
    return latest;
  }

  function startOfToday() {
    var now = new Date();
    return new Date(now.getFullYear(), now.getMonth(), now.getDate());
  }

  function startOfMonth(date) {
    return new Date(date.getFullYear(), date.getMonth(), 1);
  }

  function endOfMonth(date) {
    return new Date(date.getFullYear(), date.getMonth() + 1, 0);
  }

  function isInCalendarMonth(value, monthDate) {
    var parsed = parseDate(value);
    return !!(parsed && monthDate && parsed.getFullYear() === monthDate.getFullYear() && parsed.getMonth() === monthDate.getMonth());
  }

  function daysBetween(later, earlier) {
    if (!later || !earlier) {
      return 0;
    }
    return Math.max(0, Math.floor((later.getTime() - earlier.getTime()) / 86400000));
  }

  function hoursBetween(later, earlier) {
    if (!later || !earlier) {
      return 0;
    }
    return Math.max(0, Math.floor((later.getTime() - earlier.getTime()) / 3600000));
  }

  function businessDaysBetweenInclusive(startDate, endDate) {
    if (!startDate || !endDate || startDate > endDate) {
      return 0;
    }

    var cursor = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
    var last = new Date(endDate.getFullYear(), endDate.getMonth(), endDate.getDate());
    var count = 0;

    while (cursor <= last) {
      var day = cursor.getDay();
      if (day !== 0 && day !== 6) {
        count += 1;
      }
      cursor.setDate(cursor.getDate() + 1);
    }

    return count;
  }

  function formatCurrency(value) {
    return new Intl.NumberFormat("en-CA", {
      style: "currency",
      currency: "CAD",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    }).format(toNumber(value));
  }

  function formatPercent(value) {
    var amount = toNumber(value);
    return new Intl.NumberFormat("en-CA", {
      style: "percent",
      minimumFractionDigits: 0,
      maximumFractionDigits: 1
    }).format(amount / 100);
  }

  function percentWidth(value) {
    return Math.max(0, Math.min(toNumber(value), 100)).toFixed(1) + "%";
  }

  function activeFiscalYear(referenceDate) {
    var date = referenceDate || new Date();
    var fiscalYear = date.getMonth() >= 6 ? date.getFullYear() + 1 : date.getFullYear();
    return "FY" + String(fiscalYear).slice(-2);
  }

  function normalizeFiscalYear(value, fallbackDate) {
    var text = String(value || "").trim().toUpperCase();
    if (/^FY\d{2}$/.test(text)) {
      return text;
    }
    if (/^\d{4}$/.test(text)) {
      return "FY" + text.slice(-2);
    }
    return activeFiscalYear(fallbackDate);
  }

  function fiscalYearNumber(value, fallbackDate) {
    var label = normalizeFiscalYear(value, fallbackDate);
    return 2000 + parseInteger(label.slice(-2), (fallbackDate || new Date()).getFullYear() - 2000);
  }

  function fiscalMonthMeta(monthNumber) {
    var parsed = parseInteger(monthNumber, 0);
    for (var i = 0; i < FISCAL_MONTHS.length; i += 1) {
      if (FISCAL_MONTHS[i].number === parsed) {
        return FISCAL_MONTHS[i];
      }
    }
    return null;
  }

  function fiscalMonthLabel(monthNumber) {
    var meta = fiscalMonthMeta(monthNumber);
    return meta ? meta.fullLabel : "Current Month";
  }

  function fiscalMonthOrder(monthNumber) {
    for (var i = 0; i < FISCAL_MONTHS.length; i += 1) {
      if (FISCAL_MONTHS[i].number === parseInteger(monthNumber, 0)) {
        return i;
      }
    }
    return -1;
  }

  function fiscalMonthCalendarYear(fiscalYear, monthNumber, fallbackDate) {
    var yearNumber = fiscalYearNumber(fiscalYear, fallbackDate || new Date());
    return parseInteger(monthNumber, 0) >= 7 ? yearNumber - 1 : yearNumber;
  }

  function budgetSelectionScore(record, expectedMonth, expectedFiscalYear, fallbackDate) {
    var updated = latestDate(record && record.qfu_lastupdated, record && record.createdon);
    var created = parseDate(record && record.createdon);
    var rowFiscalYear = normalizeFiscalYear(record && (record.qfu_fiscalyear || record.qfu_year), fallbackDate || new Date());
    var rowMonth = parseInteger(record && record.qfu_month, 0);
    var rowSourceFamily = String(record && record.qfu_sourcefamily || "").trim().toUpperCase();
    return [
      rowFiscalYear === expectedFiscalYear ? 1 : 0,
      rowMonth === parseInteger(expectedMonth, 0) ? 1 : 0,
      rowSourceFamily === "SA1300" ? 1 : 0,
      budgetRowIsActive(record) ? 1 : 0,
      String(record && record.qfu_fiscalyear || "").trim() ? 1 : 0,
      toNumber(record && record.qfu_actualsales) > 0 ? 1 : 0,
      updated ? updated.getTime() : 0,
      created ? created.getTime() : 0
    ];
  }

  function latestBudgetMoment(rows) {
    return (rows || []).reduce(function (latest, record) {
      var candidate = latestDate(record && record.qfu_lastupdated, record && record.modifiedon, record && record.createdon);
      return candidate && (!latest || candidate > latest) ? candidate : latest;
    }, null);
  }

  function selectBudgetRowForPeriod(branch, budgets, monthNumber, fiscalYear, fallbackDate) {
    var expectedMonth = parseInteger(monthNumber, 0);
    var scoredRows = (budgets || []).slice().sort(function (left, right) {
      var leftScore = budgetSelectionScore(left, expectedMonth, fiscalYear, fallbackDate);
      var rightScore = budgetSelectionScore(right, expectedMonth, fiscalYear, fallbackDate);
      for (var i = 0; i < leftScore.length; i += 1) {
        if (leftScore[i] !== rightScore[i]) {
          return rightScore[i] - leftScore[i];
        }
      }
      return 0;
    });
    return scoredRows[0] || null;
  }

  function latestBudgetArchiveForBranch(budgetArchives, branch, monthNumber, fiscalYear, contextDate) {
    var referenceDate = contextDate || new Date();
    return (budgetArchives || []).filter(function (row) {
      var rowFiscalYear = normalizeFiscalYear(row.qfu_fiscalyear || row.qfu_year, referenceDate);
      return (row.qfu_branchslug === branch.slug || row.qfu_branchcode === branch.code) &&
        parseInteger(row.qfu_month, 0) === parseInteger(monthNumber, 0) &&
        rowFiscalYear === normalizeFiscalYear(fiscalYear, referenceDate);
    }).sort(function (left, right) {
      return (latestDate(right.modifiedon, right.qfu_lastupdated, right.createdon) || 0) - (latestDate(left.modifiedon, left.qfu_lastupdated, left.createdon) || 0);
    })[0] || null;
  }

  function budgetArchiveMapForBranch(budgetArchives, branch, fiscalYear, contextDate) {
    var referenceDate = contextDate || new Date();
    var map = {};
    (budgetArchives || []).forEach(function (row) {
      var rowFiscalYear = normalizeFiscalYear(row.qfu_fiscalyear || row.qfu_year, referenceDate);
      var monthNumber = parseInteger(row.qfu_month, 0);
      if ((row.qfu_branchslug !== branch.slug && row.qfu_branchcode !== branch.code) || !monthNumber || rowFiscalYear !== normalizeFiscalYear(fiscalYear, referenceDate)) {
        return;
      }
      var existing = map[monthNumber];
      if (!existing || (latestDate(row.modifiedon, row.qfu_lastupdated, row.createdon) || 0) > (latestDate(existing.modifiedon, existing.qfu_lastupdated, existing.createdon) || 0)) {
        map[monthNumber] = row;
      }
    });
    return map;
  }

  function formatDate(value) {
    var parsed = parseDate(value);
    return parsed ? parsed.toLocaleDateString("en-CA", { year: "numeric", month: "short", day: "numeric" }) : "No Live Data Yet";
  }

  function formatBusinessDate(value) {
    var parsed = parseBusinessDate(value);
    return parsed ? parsed.toLocaleDateString("en-CA", { year: "numeric", month: "short", day: "numeric" }) : "No Live Data Yet";
  }

  function formatDateTime(value) {
    var parsed = parseDate(value);
    return parsed ? parsed.toLocaleString("en-CA", { year: "numeric", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }) : "No Live Data Yet";
  }

  function formatMonthYear(value) {
    var parsed = parseDate(value);
    return parsed ? parsed.toLocaleDateString("en-CA", { year: "numeric", month: "long" }) : "No Live Data Yet";
  }

  function freshnessMoment(status, freshness) {
    var text = String(freshness || "").trim();
    if ((status === "live" || status === "stale") && text.indexOf("•") >= 0) {
      return text.split("•").slice(1).join("•").trim();
    }
    return text || "No Live Data Yet";
  }

  function freshnessStateLabel(status, freshness) {
    if (status === "live") {
      return "Live";
    }
    if (status === "stale") {
      return "Stale";
    }
    if (status === "locked") {
      return "Locked";
    }
    if (status === "awaiting") {
      return "Awaiting";
    }
    var text = String(freshness || "").trim();
    return text.indexOf("•") >= 0 ? text.split("•")[0].trim() : (text || "Not Live");
  }

  function freshnessCopy(status, freshness) {
    if (status === "live" || status === "stale") {
      return "Updated " + freshnessMoment(status, freshness);
    }
    return freshnessMoment(status, freshness);
  }

  function quoteAgeDays(record, today) {
    var overdueSince = parseBusinessDate(record.qfu_overduesince);
    var nextFollowup = parseBusinessDate(record.qfu_nextfollowup);
    var sourceDate = quoteSourceMoment(record);
    if (overdueSince) {
      return daysBetween(today, overdueSince);
    }
    if (nextFollowup && nextFollowup < today) {
      return daysBetween(today, nextFollowup);
    }
    if (sourceDate) {
      return daysBetween(today, sourceDate);
    }
    return 0;
  }

  function isClosedQuote(record) {
    var status = Number(record.qfu_status || 0);
    return status === 2 || status === 3 || status === 4;
  }

  function quoteStatusSlug(statusValue) {
    var status = Number(statusValue || 0);
    if (status === 2) {
      return "won";
    }
    if (status === 3 || status === 4) {
      return "lost";
    }
    return "open";
  }

  function isOverdueBackorder(record, today) {
    var onTime = parseBusinessDate(record.qfu_ontimedate);
    return toNumber(record.qfu_daysoverdue) > 0 || (onTime && onTime < today);
  }

  function uniqueCount(items, selector) {
    var seen = {};
    (items || []).forEach(function (item) {
      var key = String(selector(item) || "").trim().toUpperCase();
      if (key) {
        seen[key] = true;
      }
    });
    return Object.keys(seen).length;
  }

  function sum(items, selector) {
    return (items || []).reduce(function (total, item) {
      return total + toNumber(selector(item));
    }, 0);
  }

  function badge(status, label) {
    return '<span class="qfu-phase0-badge qfu-phase0-badge--' + escapeHtml(status) + '">' + escapeHtml(label) + "</span>";
  }

  function breadcrumbs(items) {
    return '<nav class="qfu-phase0-breadcrumbs">' + items.map(function (item, index) {
      var current = index === items.length - 1;
      var body = current || !item.url ? "<span>" + escapeHtml(item.label) + "</span>" : '<a href="' + escapeHtml(item.url) + '">' + escapeHtml(item.label) + "</a>";
      return body + (current ? "" : '<span class="qfu-phase0-sep">/</span>');
    }).join("") + "</nav>";
  }

  function hero(options) {
    var metaHtml = (options.meta || []).map(function (item) {
      return '<div class="qfu-phase0-meta-card"><span>' + escapeHtml(item.label) + "</span><strong>" + escapeHtml(item.value) + "</strong></div>";
    }).join("");

    return (
      '<section class="qfu-phase0-hero">' +
      (options.breadcrumbs || "") +
      '<div class="qfu-phase0-hero__top"><span class="qfu-phase0-kicker">' + escapeHtml(options.kicker) + '</span><div class="qfu-phase0-status-row">' + (options.badges || []).join("") + "</div></div>" +
      '<div class="qfu-phase0-title-row"><div class="qfu-phase0-title-group"><h1 class="qfu-phase0-title">' + escapeHtml(options.title) + '</h1><p class="qfu-phase0-subtitle">' + escapeHtml(options.subtitle) + "</p></div></div>" +
      '<div class="qfu-phase0-hero__meta">' + metaHtml + "</div>" +
      '<div class="qfu-phase0-note"><strong>Current Note</strong><div>' + escapeHtml(options.note || "") + "</div></div>" +
      "</section>"
    );
  }

  function renderLinkableTile(className, href, innerHtml) {
    if (href) {
      return '<a class="' + className + ' is-link" href="' + escapeHtml(href) + '">' + innerHtml + "</a>";
    }
    return '<article class="' + className + '">' + innerHtml + "</article>";
  }

  function kpiStrip(items) {
    return '<section class="qfu-phase0-kpi-strip">' + (items || []).map(function (item) {
      return renderLinkableTile('qfu-phase0-kpi' + (item.tone ? " is-" + escapeHtml(item.tone) : ""), item.href, '<span>' + escapeHtml(item.label) + "</span><strong>" + escapeHtml(item.value) + "</strong>" + (item.note ? '<em>' + escapeHtml(item.note) + "</em>" : ""));
    }).join("") + "</section>";
  }

  function panel(title, eyebrow, body, action) {
    return (
      '<section class="qfu-phase0-panel">' +
      '<div class="qfu-phase0-panel__header"><div><div class="qfu-phase0-panel__eyebrow">' + escapeHtml(eyebrow) + '</div><h2 class="qfu-phase0-panel__title">' + escapeHtml(title) + "</h2></div>" + (action || "") + "</div>" +
      body +
      "</section>"
    );
  }

  function renderScopeList(items) {
    return '<ul class="qfu-phase0-section-list">' + (items || []).map(function (item) {
      return "<li><span>" + escapeHtml(item[0]) + "</span><strong>" + escapeHtml(item[1]) + "</strong></li>";
    }).join("") + "</ul>";
  }

  async function getToken() {
    var input = document.querySelector('input[name="__RequestVerificationToken"]');
    if (input && input.value) {
      return input.value;
    }
    if (window.shell && typeof window.shell.getTokenDeferred === "function") {
      return new Promise(function (resolve, reject) {
        try {
          window.shell.getTokenDeferred().done(resolve).fail(reject);
        } catch (error) {
          reject(error);
        }
      });
    }
    var response = await fetch("/_layout/tokenhtml", { credentials: "same-origin" });
    var html = await response.text();
    var container = document.createElement("div");
    container.innerHTML = html;
    var hidden = container.querySelector('input[name="__RequestVerificationToken"]');
    if (!hidden || !hidden.value) {
      throw new Error("Portal verification token was not available.");
    }
    return hidden.value;
  }

  async function request(path, options) {
    var token = await getToken();
    var config = Object.assign({ method: "GET", credentials: "same-origin", headers: {} }, options || {});
    config.headers = Object.assign({}, config.headers, { Accept: "application/json", "__RequestVerificationToken": token });
    if (config.body && !config.headers["Content-Type"]) {
      config.headers["Content-Type"] = "application/json";
    }
    var response = await fetch(path, config);
    if (!response.ok) {
      var text = "";
      try {
        text = await response.text();
      } catch (error) {
        text = "";
      }
      throw new Error((response.status + " " + response.statusText + (text ? ": " + text : "")).trim());
    }
    if (response.status === 204) {
      return {};
    }
    var responseText = await response.text();
    return responseText ? JSON.parse(responseText) : {};
  }

  function createRuntimeDiagnostics() {
    return {
      critical: [],
      warnings: [],
      seen: {}
    };
  }

  function addRuntimeDiagnostic(diagnostics, severity, item) {
    if (!diagnostics || !item) {
      return;
    }
    var bucketName = severity === "critical" ? "critical" : "warnings";
    var key = [
      bucketName,
      item.code || "",
      item.dataset || "",
      item.branchSlug || "",
      item.regionSlug || "",
      item.detail || ""
    ].join("|");
    if (diagnostics.seen[key]) {
      return;
    }
    diagnostics.seen[key] = true;
    diagnostics[bucketName].push(item);
  }

  function classifyDatasetFailure(error) {
    var message = String(error && error.message || "").trim();
    if (!message) {
      return "unknown";
    }
    if (message.indexOf("401") !== -1 || message.indexOf("Unauthorized") !== -1) {
      return "unauthorized";
    }
    if (message.indexOf("403") !== -1 || message.indexOf("Forbidden") !== -1) {
      return "forbidden";
    }
    if (message.indexOf("404") !== -1) {
      return "not-found";
    }
    if (message.indexOf("500") !== -1) {
      return "server-error";
    }
    return "request-failed";
  }

  async function getAll(path, options) {
    options = options || {};
    var rows = [];
    var next = path;
    var pageCount = 0;
    var maxPages = parseInteger(options.maxPages, GETALL_MAX_PAGES);
    var visited = {};
    while (next) {
      if (visited[next]) {
        console.warn("QFU runtime pagination guard tripped", options.datasetName || path, {
          reason: "repeated-nextlink",
          pageCount: pageCount,
          nextLink: next
        });
        if (typeof options.onGuardTrip === "function") {
          options.onGuardTrip({
            type: "repeated-nextlink",
            pageCount: pageCount,
            nextLink: next
          });
        }
        break;
      }
      if (pageCount >= maxPages) {
        console.warn("QFU runtime pagination guard tripped", options.datasetName || path, {
          reason: "max-pages",
          pageCount: pageCount,
          maxPages: maxPages,
          nextLink: next
        });
        if (typeof options.onGuardTrip === "function") {
          options.onGuardTrip({
            type: "max-pages",
            pageCount: pageCount,
            maxPages: maxPages,

        }
        break;

      if (options.top && rows.length >= options.top) {
        console.warn("QFU runtime dataset may be truncated", datasetName, {

        });
        addRuntimeDiagnostic(diagnostics, "warning", {

  async function copyText(value) {
    var text = String(value || "");
    if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
      await navigator.clipboard.writeText(text);
      return;
    }
    var helper = document.createElement("textarea");
    helper.value = text;
    helper.setAttribute("readonly", "readonly");
    helper.style.position = "fixed";
    helper.style.opacity = "0";
    document.body.appendChild(helper);
    helper.select();
    document.execCommand("copy");
    document.body.removeChild(helper);
  }

  function downloadText(filename, text, mimeType) {
    var blob = new Blob([String(text || "")], { type: mimeType || "text/plain;charset=utf-8" });
    var url = window.URL.createObjectURL(blob);
    var link = document.createElement("a");
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    window.setTimeout(function () {
      window.URL.revokeObjectURL(url);
    }, 1000);
  }

  async function saveDeliveryComment(root, button) {
    var row = button.closest("[data-qfu-delivery-row]");
    var recordId = button.getAttribute("data-qfu-save-delivery-comment");
    var textarea = row ? row.querySelector("[data-qfu-delivery-comment]") : null;
    var status = row ? row.querySelector("[data-qfu-delivery-status]") : null;
    if (!row || !recordId || !textarea) {
      return;
    }

    var commentValue = String(textarea.value || "");
    var originalValue = String(textarea.getAttribute("data-original-value") || "");
    if (commentValue === originalValue) {
      return;
    }

    var payload = {
      qfu_comment: commentValue,
      qfu_commentupdatedon: new Date().toISOString(),
      qfu_commentupdatedbyname: currentPortalUserName(root)
    };

    if (status) {
      status.textContent = "Saving...";
    }

    await patchRecord("qfu_deliverynotpgis", recordId, payload);
    await rerenderAfterSave(root, "success", "Delivery comment saved.");
  }

  function bindDeliveryNotPgiActions(root, branch) {
    root.querySelectorAll("[data-qfu-delivery-comment]").forEach(function (textarea) {
      var row = textarea.closest("[data-qfu-delivery-row]");

      textarea.addEventListener("input", function () {
        setDeliveryCommentDirtyState(row);
      });
    });

    root.querySelectorAll("[data-qfu-save-delivery-comment]").forEach(function (button) {
      button.addEventListener("click", async function () {
        if (button.disabled) {
          return;
        }
        button.disabled = true;
        try {
          await saveDeliveryComment(root, button);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Delivery comment save failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });

    root.querySelectorAll("[data-qfu-copy-delivery-list]").forEach(function (button) {
      button.addEventListener("click", async function () {
        var originalLabel = button.textContent;
        button.disabled = true;
        try {
          await copyText(buildDeliveryNotPgiDelimited(filteredDeliveryNotPgiRows(branch), deliveryNotPgiVisibleColumns(), "\t"));
          button.textContent = "Copied";
          window.setTimeout(function () {
            if (document.body.contains(button)) {
              button.textContent = originalLabel;
              button.disabled = false;
            }
          }, 1200);
        } catch (error) {
          button.textContent = "Copy Failed";
          window.setTimeout(function () {
            if (document.body.contains(button)) {
              button.textContent = originalLabel;
              button.disabled = false;
            }
          }, 1600);
        }
      });
    });

    root.querySelectorAll("[data-qfu-export-delivery-csv]").forEach(function (button) {
      button.addEventListener("click", function () {
        var rows = filteredDeliveryNotPgiRows(branch);
        var csvText = buildDeliveryNotPgiDelimited(rows, deliveryNotPgiCsvColumns(), ",");

    });
  }

  async function patchRecord(entitySet, id, body) {
    if (!id) {
      throw new Error("Missing Dataverse record id.");
    }
    await request("/_api/" + entitySet + "(" + encodeURIComponent(id) + ")", {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "If-Match": "*"
      },
      body: JSON.stringify(body)
    });
  }

  async function createRecord(entitySet, body) {
    await request("/_api/" + entitySet, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });
  }

  function invalidateRuntime() {
    RUNTIME_PROMISE = null;
    RUNTIME_STATE = null;
  }

  function inputValue(row, selector) {
    var element = row.querySelector(selector);
    return element ? String(element.value || "").trim() : "";
  }

  function checkboxValue(row, selector) {
    var element = row.querySelector(selector);
    return !!(element && element.checked);
  }

  async function rerenderAfterSave(root, tone, message) {
    FLASH_MESSAGE = { tone: tone, text: message };
    invalidateRuntime();
    await renderRoot(root);
  }

  async function saveRegionRow(root, button, state) {
    var row = button.closest("tr");
    var regionSlug = button.getAttribute("data-qfu-save-region");
    var region = state.regionMap[regionSlug];
    var regionName = inputValue(row, '[data-field="region-name"]') || (region && region.name) || regionSlug;
    var payload = {
      qfu_name: regionName,
      qfu_regionname: regionName,
      qfu_status: inputValue(row, '[data-field="status"]') || "awaiting",
      qfu_stalethresholdhours: parseInteger(inputValue(row, '[data-field="stale-hours"]'), region ? region.config.staleHours : DEFAULT_STALE_HOURS),
      qfu_budgetpacewarningpct: parseInteger(inputValue(row, '[data-field="budget-warn"]'), region ? region.config.budgetWarn : DEFAULT_BUDGET_WARN),
      qfu_overduequotewarningcount: parseInteger(inputValue(row, '[data-field="quote-warn"]'), region ? region.config.quoteWarn : DEFAULT_QUOTE_WARN),
      qfu_overduebackorderwarningcount: parseInteger(inputValue(row, '[data-field="backorder-warn"]'), region ? region.config.backorderWarn : DEFAULT_BACKORDER_WARN),
      qfu_managernote: inputValue(row, '[data-field="note"]')
    };

    await patchRecord("qfu_regions", row.getAttribute("data-record-id"), payload);

    var affectedBranches = state.branches.filter(function (branch) {
      return (branch.config.regionSlug || branch.regionSlug) === regionSlug;
    });

    for (var i = 0; i < affectedBranches.length; i += 1) {
      await patchRecord("qfu_branchs", affectedBranches[i].config.id, {
        qfu_regionname: regionName
      });
    }

    await rerenderAfterSave(root, "success", regionName + " region settings saved.");
  }

  async function saveBranchRow(root, button, state) {
    var row = button.closest("tr");
    var branchSlug = button.getAttribute("data-qfu-save-branch");
    var branch = state.branchMap[branchSlug];
    var regionSlug = inputValue(row, '[data-field="region-slug"]') || (branch && branch.config.regionSlug) || "southern-alberta";
    var region = state.regionMap[regionSlug];
    var branchName = inputValue(row, '[data-field="branch-name"]') || (branch && branch.name) || branchSlug;
    var payload = {
      qfu_name: (branch ? branch.code : "") + " " + branchName,
      qfu_branchname: branchName,
      qfu_regionslug: regionSlug,
      qfu_regionname: region ? region.name : regionSlug,
      qfu_branchstate: inputValue(row, '[data-field="state"]') || "awaiting",
      qfu_mailboxaddress: inputValue(row, '[data-field="mailbox"]'),
      qfu_stalethresholdhours: parseInteger(inputValue(row, '[data-field="stale-hours"]'), branch ? branch.config.staleHours : DEFAULT_STALE_HOURS),
      qfu_budgetpacewarningpct: parseInteger(inputValue(row, '[data-field="budget-warn"]'), branch ? branch.config.budgetWarn : DEFAULT_BUDGET_WARN),
      qfu_overduequotewarningcount: parseInteger(inputValue(row, '[data-field="quote-warn"]'), branch ? branch.config.quoteWarn : DEFAULT_QUOTE_WARN),
      qfu_overduebackorderwarningcount: parseInteger(inputValue(row, '[data-field="backorder-warn"]'), branch ? branch.config.backorderWarn : DEFAULT_BACKORDER_WARN),
      qfu_managernote: inputValue(row, '[data-field="note"]')
    };

    await patchRecord("qfu_branchs", row.getAttribute("data-record-id"), payload);

    var relatedFeeds = state.sourceFeeds.filter(function (feed) {
      return feed.qfu_branchslug === branchSlug;
    });

    for (var i = 0; i < relatedFeeds.length; i += 1) {
      await patchRecord("qfu_sourcefeeds", relatedFeeds[i].qfu_sourcefeedid, {
        qfu_regionslug: regionSlug
      });
    }

    await rerenderAfterSave(root, "success", (branch ? branch.code + " " : "") + branchName + " branch settings saved.");
  }

  async function saveFeedRow(root, button, state) {
    var row = button.closest("tr");
    var recordId = button.getAttribute("data-qfu-save-feed");
    var feed = state.sourceFeeds.filter(function (item) {
      return item.qfu_sourcefeedid === recordId;
    })[0] || null;
    var enabled = checkboxValue(row, '[data-field="enabled"]');
    var folderId = feedRequiresInboxLock(feed) ? "Inbox" : inputValue(row, '[data-field="folder"]');
    var payload = {
      qfu_mailboxaddress: inputValue(row, '[data-field="mailbox"]'),
      qfu_folderid: folderId,
      qfu_subjectfilter: inputValue(row, '[data-field="subject"]'),
      qfu_filenamepattern: inputValue(row, '[data-field="pattern"]'),
      qfu_enabled: enabled ? false : true
    };

    await patchRecord("qfu_sourcefeeds", recordId, payload);
    await rerenderAfterSave(root, "success", (feed ? feed.qfu_branchcode + " " + feed.qfu_sourcefamily : "Source feed") + (feedRequiresInboxLock(feed) ? " settings saved. Inbox trigger remains locked." : " settings saved."));
  }

  async function saveBudgetArchiveRow(root, button, state) {
    var row = button.closest("tr");
    var branchSlug = button.getAttribute("data-qfu-save-budget");
    var branch = state.branchMap[branchSlug];
    var fiscalYear = row.getAttribute("data-fiscal-year") || state.activeFiscalYear || activeFiscalYear(new Date());
    var fiscalYearValue = fiscalYearNumber(fiscalYear, new Date());
    var archiveMap = budgetArchiveMapForBranch(state.budgetArchives, branch, fiscalYear, new Date());
    var updatedCount = 0;

    for (var i = 0; i < FISCAL_MONTHS.length; i += 1) {
      var monthMeta = FISCAL_MONTHS[i];
      var rawValue = inputValue(row, '[data-field="budget-' + monthMeta.number + '"]');
      var existing = archiveMap[monthMeta.number];
      if (!rawValue && !existing) {
        continue;
      }

      var budgetValue = toNumber(rawValue);
      var payload = {
        qfu_name: branch.code + " " + monthMeta.shortLabel + " " + fiscalYear + " Budget Target",
        qfu_sourceid: branch.code + "|budgetarchive|" + fiscalYear + "|" + String(monthMeta.number).padStart(2, "0"),
        qfu_budgetgoal: budgetValue,
        qfu_month: monthMeta.number,
        qfu_monthname: monthMeta.fullLabel,
        qfu_year: fiscalYearValue,
        qfu_fiscalyear: fiscalYear,
        qfu_lastupdated: new Date().toISOString(),
        qfu_branchcode: branch.code,
        qfu_branchslug: branch.slug,
        qfu_regionslug: branch.regionSlug,
        qfu_sourcefamily: "Manager Panel"
      };

      if (existing) {
        await patchRecord("qfu_budgetarchives", existing.qfu_budgetarchiveid, payload);
      } else {
        await createRecord("qfu_budgetarchives", payload);
      }
      updatedCount += 1;
    }

    await rerenderAfterSave(root, "success", branch.code + " " + branch.name + " budget targets saved for " + fiscalYear + " (" + updatedCount + " months).");
  }

  function bindOpsActions(root, state) {
    root.querySelectorAll("[data-qfu-save-region]").forEach(function (button) {
      button.addEventListener("click", async function () {
        if (button.disabled) {
          return;
        }
        button.disabled = true;
        try {
          await saveRegionRow(root, button, state);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Region save failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });

    root.querySelectorAll("[data-qfu-save-branch]").forEach(function (button) {
      button.addEventListener("click", async function () {
        if (button.disabled) {
          return;
        }
        button.disabled = true;
        try {
          await saveBranchRow(root, button, state);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Branch save failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });

    root.querySelectorAll("[data-qfu-save-feed]").forEach(function (button) {
      button.addEventListener("click", async function () {
        if (button.disabled) {
          return;
        }
        button.disabled = true;
        try {
          await saveFeedRow(root, button, state);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Source feed save failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });

    root.querySelectorAll("[data-qfu-save-budget]").forEach(function (button) {
      button.addEventListener("click", async function () {
        if (button.disabled) {
          return;
        }
        button.disabled = true;
        try {
          await saveBudgetArchiveRow(root, button, state);
        } catch (error) {
          FLASH_MESSAGE = { tone: "error", text: "Budget target save failed: " + error.message };
          await renderRoot(root);
        } finally {
          if (document.body.contains(button)) {
            button.disabled = false;
          }
        }
      });
    });
  }

  function scheduleRerender(root) {
    if (!root || root.dataset.qfuRuntimeRenderScheduled === "1") {
      return;
    }
    root.dataset.qfuRuntimeRenderScheduled = "1";
    window.setTimeout(function () {
      if (!document.body.contains(root)) {
        return;
      }
      root.dataset.qfuRuntimeRenderScheduled = "";
      renderRoot(root).catch(function (error) {
        console.error("QFU runtime rerender failed", error);
      });
    }, 60);
  }

  function observeRoot(root) {
    if (!root || OBSERVERS.has(root)) {
      return;
    }
    var observer = new MutationObserver(function () {
      if (root.dataset.qfuRuntimeRendering === "1") {
        return;
      }
      if (!root.querySelector("[data-qfu-runtime-signature]")) {
        scheduleRerender(root);
      }
    });
    observer.observe(root, { childList: true });
    OBSERVERS.set(root, observer);
  }

  async function renderRoot(root) {
    observeRoot(root);
    var state = await loadRuntime();
    var pageType = root.getAttribute("data-page");
    var branchSlug = root.getAttribute("data-branch") || "";
    var regionSlug = root.getAttribute("data-region") || "";
    var branch = branchSlug ? state.branchMap[branchSlug] : null;
    var region = regionSlug ? state.regionMap[regionSlug] : null;
    var viewKey = new URLSearchParams(window.location.search).get("view") || "follow-up-queue";
    var html = "";

    if (pageType === "hub") {
      html = renderHub(state);
    } else if (pageType === "region" && region) {
      html = renderRegionLive(region);
    } else if (pageType === "branch" && branch) {
      html = renderBranchLive(branch);
    } else if (pageType === "detail" && branch) {
      html = await renderDetailLive(branch, viewKey);
    } else if (pageType === "ops") {
      html = renderOps(state);
    } else {
      html = '<div class="qfu-phase0-shell"><div class="qfu-phase0-empty-state"><strong>Page configuration missing</strong><p class="qfu-phase0-empty-copy">QFU runtime metadata was not found for this route.</p></div></div>';
    }

    html = renderRuntimeDiagnosticsMarkup(state, {
      pageType: pageType,
      branchSlug: branchSlug,
      regionSlug: regionSlug
    }) + html;

    root.dataset.qfuRuntimeRendering = "1";
    root.innerHTML = managedHtml(html);
    root.dataset.qfuRuntimeRendering = "";
    root.dataset.qfuRuntimeManaged = "1";

    if (pageType === "ops") {
      bindOpsActions(root, state);
    } else if (pageType === "branch") {
      bindDashboardPaging(root);
    } else if (pageType === "detail" && branch && viewKey === "ready-to-ship-not-pgid") {
      bindDeliveryNotPgiActions(root, branch);
    }
  }

  function renderRuntimeFailure(root, error) {
    console.error("QFU regional runtime failed", error);
    root.innerHTML = managedHtml('<div class="qfu-phase0-shell"><div class="qfu-phase0-empty-state"><strong>Regional runtime failed</strong><p class="qfu-phase0-empty-copy">' + escapeHtml(error.message) + "</p></div></div>");
  }

  function bindDashboardPaging(root) {
    if (root.dataset.qfuDashboardPagingBound === "1") {
      return;
    }

    root.addEventListener("click", function (event) {
      var target = event.target;
      var button = target && target.closest ? target.closest("[data-qfu-dashboard-page]") : null;
      if (!button || !root.contains(button)) {
        return;
      }

      event.preventDefault();
      var paramName = button.getAttribute("data-qfu-dashboard-page");
      var pageNumber = parseInt(button.getAttribute("data-qfu-page-number") || "1", 10);
      if (!paramName || !Number.isFinite(pageNumber) || dashboardPageValue(paramName) === pageNumber) {
        return;
      }

      window.history.pushState({ qfuDashboardPage: true }, "", dashboardPageHref(paramName, pageNumber));
      renderRoot(root).catch(function (error) {
        renderRuntimeFailure(root, error);
      });
    });

    root.dataset.qfuDashboardPagingBound = "1";
  }

  function bindPopState() {
    if (document.body.dataset.qfuRuntimePopstateBound === "1") {
      return;
    }

    window.addEventListener("popstate", function () {
      var roots = document.querySelectorAll("[data-qfu-phase0]");
      Array.prototype.forEach.call(roots, function (root) {
        renderRoot(root).catch(function (error) {
          renderRuntimeFailure(root, error);
        });
      });
    });

    document.body.dataset.qfuRuntimePopstateBound = "1";
  }

  function mount() {
    bindPopState();
    var roots = document.querySelectorAll("[data-qfu-phase0]");
    Array.prototype.forEach.call(roots, function (root) {
      renderRoot(root).catch(function (error) {
        renderRuntimeFailure(root, error);
      });
    });
  }

  document.addEventListener("DOMContentLoaded", mount);
})();

</script>
