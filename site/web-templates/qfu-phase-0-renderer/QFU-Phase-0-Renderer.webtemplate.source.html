  function bySlug(items, slug) {
    for (var i = 0; i < items.length; i += 1) {
      if (items[i].slug === slug) {
        return items[i];
      }
    }
    return null;
  }

  function escapeHtml(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function badge(status, label) {
    return '<span class="qfu-phase0-badge qfu-phase0-badge--' + escapeHtml(status) + '">' + escapeHtml(label) + "</span>";
  }

  function breadcrumbs(items) {
    return (
      '<nav class="qfu-phase0-breadcrumbs" aria-label="Breadcrumb">' +
      items
        .map(function (item, index) {
          var link = item.url ? '<a href="' + escapeHtml(item.url) + '">' + escapeHtml(item.label) + "</a>" : "<span>" + escapeHtml(item.label) + "</span>";
          if (index === items.length - 1) {
            return link;
          }
          return link + '<span class="qfu-phase0-sep">/</span>';
        })
        .join("") +
      "</nav>"
    );
  }

  function numericDays(value) {

  function shortDate(value) {

    if (isoMatch) {
      return String(parseInt(isoMatch[2], 10)) + "/" + String(parseInt(isoMatch[3], 10)) + "/" + isoMatch[1];

    var slashMatch = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);

  function fetchWithTimeout(path, options, timeoutMs) {
    if (typeof AbortController !== "function") {
      return fetch(path, options);
    }

    var controller = new AbortController();
    var timer = window.setTimeout(function () {
      controller.abort();
    }, timeoutMs);
    var requestOptions = Object.assign({}, options || {}, { signal: controller.signal });

    return fetch(path, requestOptions).then(function (response) {
      window.clearTimeout(timer);
      return response;
    }).catch(function (error) {
      window.clearTimeout(timer);
      throw error;
    });
  }

  function fetchPortalTokenFromLayout() {
    return fetchWithTimeout("/_layout/tokenhtml", { credentials: "same-origin" }, API_REQUEST_TIMEOUT_MS)
      .then(function (response) {
        if (!response.ok) {
          throw new Error("Failed to fetch portal verification token.");
        }
        return response.text();
      })
      .then(function (html) {
        var container = document.createElement("div");
        container.innerHTML = html;
        var hidden = container.querySelector('input[name="' + PORTAL_TOKEN_HEADER + '"]');
        if (!hidden || !hidden.value) {
          throw new Error("Portal verification token was not present in the tokenhtml response.");
        }
        return hidden.value;
      });
  }

  function getPortalToken() {
    if (PHASE1_PORTAL_TOKEN) {
      return Promise.resolve(PHASE1_PORTAL_TOKEN);
    }

    if (PHASE1_PORTAL_TOKEN_PROMISE) {
      return PHASE1_PORTAL_TOKEN_PROMISE;
    }

    PHASE1_PORTAL_TOKEN_PROMISE = new Promise(function (resolve, reject) {
      var input = document.querySelector('input[name="' + PORTAL_TOKEN_HEADER + '"]');
      if (input && input.value) {
        resolve(input.value);
        return;
      }

      var meta = document.querySelector('meta[name="' + PORTAL_TOKEN_HEADER + '"]');
      if (meta && meta.content) {
        resolve(meta.content);
        return;
      }

      if (window.shell && typeof window.shell.getTokenDeferred === "function") {
        try {
          var deferred = window.shell.getTokenDeferred();
          if (deferred && typeof deferred.done === "function" && typeof deferred.fail === "function") {
            var settled = false;
            var fallbackTimer = window.setTimeout(function () {
              if (settled) {
                return;
              }
              fetchPortalTokenFromLayout().then(function (token) {
                settled = true;
                resolve(token);
              }, function (error) {
                settled = true;
                reject(error);
              });
            }, PORTAL_TOKEN_TIMEOUT_MS);
            deferred.done(function (token) {
              if (settled) {
                return;
              }
              settled = true;
              window.clearTimeout(fallbackTimer);
              resolve(token);
            }).fail(function () {
              if (settled) {
                return;
              }
              settled = true;
              window.clearTimeout(fallbackTimer);
              fetchPortalTokenFromLayout().then(resolve, reject);
            });
            return;
          }
          if (deferred && typeof deferred.then === "function") {
            Promise.race([
              deferred,
              new Promise(function (_, rejectTimeout) {
                window.setTimeout(function () {
                  rejectTimeout(new Error("shell token timed out"));
                }, PORTAL_TOKEN_TIMEOUT_MS);
              })
            ]).then(resolve, function () {
              fetchPortalTokenFromLayout().then(resolve, reject);
            });
            return;
          }
        } catch (error) {
          fetchPortalTokenFromLayout().then(resolve, function () {
            reject(error);
          });
          return;
        }
      }

      fetchPortalTokenFromLayout().then(resolve).catch(reject);
    }).then(function (token) {
      PHASE1_PORTAL_TOKEN = token;
      PHASE1_PORTAL_TOKEN_PROMISE = null;
      return token;
    }, function (error) {
      PHASE1_PORTAL_TOKEN = null;
      PHASE1_PORTAL_TOKEN_PROMISE = null;
      throw error;
    });

    return PHASE1_PORTAL_TOKEN_PROMISE;
  }

  function dayDiff(later, earlier) {
    if (!later || !earlier) {
      return 0;
    }
    return Math.max(0, Math.floor((later.getTime() - earlier.getTime()) / 86400000));
  }

  function businessDaysBetweenInclusive(startDate, endDate) {
    if (!startDate || !endDate || endDate < startDate) {
      return 0;
    }

    var count = 0;
    var current = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
    var finalDate = new Date(endDate.getFullYear(), endDate.getMonth(), endDate.getDate());

    while (current <= finalDate) {
      var day = current.getDay();
      if (day !== 0 && day !== 6) {
        count += 1;
      }
      current.setDate(current.getDate() + 1);
    }

    return count;
  }

  function apiGet(path) {
    return getPortalToken().then(function (token) {
      return fetchWithTimeout(path, {
        credentials: "same-origin",
        headers: {
          Accept: "application/json",
          "__RequestVerificationToken": token
        }
      }, API_REQUEST_TIMEOUT_MS);
    }).then(function (response) {
      if (!response.ok) {
        var error = new Error("Request failed: " + response.status + " " + path);
        error.status = response.status;
        throw error;
      }
      return response.json();
    });
  }

  function apiGetAll(path) {
    var rows = [];

    function load(nextPath) {
      return apiGet(nextPath).then(function (payload) {
        rows = rows.concat(payload && payload.value ? payload.value : []);
        if (payload && payload["@odata.nextLink"]) {
          return load(payload["@odata.nextLink"]);
        }
        return rows;
      });
    }

    return load(path);
  }

  function preferredOwner(record) {
    return record.qfu_assignedto || record.qfu_cssrname || "Unassigned";
  }

  function isClosedQuote(record) {
    var status = Number(record.qfu_status || 0);
    return status === 2 || status === 3 || status === 4;
  }

  function quoteAgeDays(record, today) {
    var overdueSince = parseDateValue(record.qfu_overduesince);
    var nextFollowup = parseDateValue(record.qfu_nextfollowup);
    var sourceDate = parseDateValue(record.qfu_sourcedate || record.createdon);

    if (overdueSince) {
      return dayDiff(today, overdueSince);
    }
    if (nextFollowup && nextFollowup < today) {
      return dayDiff(today, nextFollowup);
    }
    if (sourceDate) {
      return dayDiff(today, sourceDate);
    }
    return 0;
  }

  function toQuoteRow(record, today) {
    var nextFollowup = parseDateValue(record.qfu_nextfollowup);
    var lastTouched = parseDateValue(record.qfu_lasttouchedon);
    return {
      quote: record.qfu_quotenumber || "Unknown",
      customer: record.qfu_customername || "Unknown customer",
      value: formatCurrencyNumber(record.qfu_amount),
      daysOverdue: String(quoteAgeDays(record, today)),
      nextFollowup: nextFollowup ? shortDate(nextFollowup.toISOString().slice(0, 10)) : "Unscheduled",
      lastTouched: lastTouched ? shortDate(lastTouched.toISOString().slice(0, 10)) : "-",
      owner: preferredOwner(record),
      openHref: "/southern-alberta/4171-calgary/detail?view=quotes",
      queueHref: "/southern-alberta/4171-calgary/detail?view=follow-up-queue"
    };
  }

  function buildBudgetModel(budgets, today) {
    if (!budgets.length) {
      return null;
    }

    var latest = budgets
      .slice()
      .sort(function (a, b) {
        var aKey = (Number(a.qfu_year || 0) * 100) + Number(a.qfu_month || 0);
        var bKey = (Number(b.qfu_year || 0) * 100) + Number(b.qfu_month || 0);
        if (aKey !== bKey) {
          return bKey - aKey;
        }
        return (parseDateValue(b.qfu_lastupdated) || 0) - (parseDateValue(a.qfu_lastupdated) || 0);
      })[0];

    var actual = toNumber(latest.qfu_actualsales);
    var goal = toNumber(latest.qfu_budgetgoal);
    var percent = toNumber(latest.qfu_percentachieved);
    if (!percent && goal > 0) {
      percent = (actual / goal) * 100;
    }

    var remaining = Math.max(0, goal - actual);
    var monthStart = startOfMonthLocal(today);
    var monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
    var businessElapsed = businessDaysBetweenInclusive(monthStart, today);
    var businessRemaining = businessDaysBetweenInclusive(today, monthEnd);
    var businessTotal = businessDaysBetweenInclusive(monthStart, monthEnd);
    var projected = actual;

    if (businessElapsed > 0 && businessTotal > 0) {
      projected = (actual / businessElapsed) * businessTotal;
    }

    return {
      month: (latest.qfu_monthname || "Current Month") + " " + (latest.qfu_year || today.getFullYear()),
      pace: formatPercentNumber(percent),
      progressWidth: Math.max(0, Math.min(percent, 100)).toFixed(1) + "%",
      actual: formatCurrencyNumber(actual),
      target: formatCurrencyNumber(goal),
      remaining: formatCurrencyNumber(remaining),
      neededPerWorkday: businessRemaining > 0 ? formatCurrencyNumber(remaining / businessRemaining) + " / day" : "Month ended",
      trending: goal > 0 ? formatCurrencyNumber(projected) + " (" + formatPercentNumber((projected / goal) * 100) + " of goal)" : formatCurrencyNumber(projected),
      updated: dateTimeLabel(latest.qfu_lastupdated),
      cad: formatCurrencyNumber(latest.qfu_cadsales),
      usd: formatCurrencyNumber(latest.qfu_usdsales),
      fx: "Not provided"
    };
  }

  function buildCalgaryPhase1Model(quotes, backorders, budgets) {
    var today = startOfTodayLocal();
    var graceCutoff = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 2);
    var monthStart = startOfMonthLocal(today);
    var nextMonthStart = startOfNextMonthLocal(today);
    var last30Cutoff = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 30);

    var allQuotes = quotes.slice();
    var openQuotes = allQuotes.filter(function (record) {
      return !isClosedQuote(record);
    });
    var liveQueueRows = openQuotes
      .slice()
      .sort(function (a, b) {
        var priorityDiff = toNumber(b.qfu_priorityscore) - toNumber(a.qfu_priorityscore);
        if (priorityDiff !== 0) {
          return priorityDiff;
        }
        return toNumber(b.qfu_amount) - toNumber(a.qfu_amount);
      })
      .map(function (record) {
        return toQuoteRow(record, today);
      });
    var allQuoteRows = allQuotes
      .slice()
      .sort(function (a, b) {
        return toNumber(b.qfu_amount) - toNumber(a.qfu_amount);
      })
      .map(function (record) {
        return toQuoteRow(record, today);
      });
    var overdueQuoteRows = openQuotes
      .filter(function (record) {
        var nextFollowup = parseDateValue(record.qfu_nextfollowup);
        return nextFollowup && nextFollowup < today;
      })
      .sort(function (a, b) {
        return quoteAgeDays(b, today) - quoteAgeDays(a, today);
      })
      .map(function (record) {
        return toQuoteRow(record, today);
      });
    var dueTodayCount = openQuotes.filter(function (record) {
      var nextFollowup = parseDateValue(record.qfu_nextfollowup);
      return nextFollowup && nextFollowup >= today && nextFollowup < new Date(today.getFullYear(), today.getMonth(), today.getDate() + 1);
    }).length;
    var unscheduledOldCount = openQuotes.filter(function (record) {
      var nextFollowup = parseDateValue(record.qfu_nextfollowup);
      var sourceDate = parseDateValue(record.qfu_sourcedate || record.createdon);
      return !nextFollowup && sourceDate && sourceDate < graceCutoff;
    }).length;
    var quotesLast30 = allQuotes.filter(function (record) {
      var sourceDate = parseDateValue(record.qfu_sourcedate || record.createdon);
      return sourceDate && sourceDate >= last30Cutoff;
    });
    var wonCount = quotesLast30.filter(function (record) { return Number(record.qfu_status || 0) === 2; }).length;
    var lostCount = quotesLast30.filter(function (record) { return Number(record.qfu_status || 0) === 3 || Number(record.qfu_status || 0) === 4; }).length;
    var overdueBackorders = backorders
      .filter(function (record) {
        var onTime = parseDateValue(record.qfu_ontimedate);
        return (Number(record.qfu_daysoverdue || 0) > 0) || (onTime && onTime < today);
      })
      .sort(function (a, b) {
        return toNumber(b.qfu_daysoverdue) - toNumber(a.qfu_daysoverdue);
      });
    var currentMonthBackorders = backorders.filter(function (record) {
      var onTime = parseDateValue(record.qfu_ontimedate);
      return onTime && onTime >= monthStart && onTime < nextMonthStart;
    });
    var currentMonthLate = currentMonthBackorders.filter(function (record) {
      var onTime = parseDateValue(record.qfu_ontimedate);
      return (Number(record.qfu_daysoverdue || 0) > 0) || (onTime && onTime < today);
    });
    var overdueBackorderRows = overdueBackorders.map(function (record) {
      return {
        onTimeDate: record.qfu_ontimedate ? shortDate(record.qfu_ontimedate.slice(0, 10)) : "-",
        order: record.qfu_salesdocnumber || "-",
        customer: record.qfu_customername || "-",
        materialNumber: record.qfu_material || "-",
        materialDescription: record.qfu_description || "-",
        quantity: String(record.qfu_quantity || ""),
        value: formatCurrencyNumber(record.qfu_totalvalue),
        cssr: record.qfu_cssrname || "Unassigned",
        daysOverdue: String(toNumber(record.qfu_daysoverdue || 0)) + " days"
      };
    });
    var cssrCounts = {};
    overdueBackorders.forEach(function (record) {
      var key = record.qfu_cssrname || "Unassigned";
      cssrCounts[key] = (cssrCounts[key] || 0) + 1;
    });
    var cssrPeople = Object.keys(cssrCounts)
      .sort(function (a, b) { return cssrCounts[b] - cssrCounts[a]; })
      .map(function (name) {
        return { name: name, count: String(cssrCounts[name]) };
      });
    var budget = buildBudgetModel(budgets, today);
    var latestBudget = budgets[0] || null;
    var syncLabel = latestBudget && latestBudget.qfu_lastupdated ? dateTimeLabel(latestBudget.qfu_lastupdated) : dateTimeLabel(new Date().toISOString());

    return {
      branch: {
        status: "live",
        statusLabel: "Live Calgary Data",
        freshness: "Target sync " + syncLabel,
        subtitle: "Approved Phase 0 branch shell with Calgary Phase 1 data wired from regionaloperationshub. This is read-only operational data inside the frozen layout.",
        kpis: [

  function applyCalgaryPhase1State(model) {
    if (!model || !model.branch) {
      return;
    }

    var calgary = bySlug(BRANCHES, PHASE1_CALGARY_SLUG);
    var southernAlberta = bySlug(REGIONS, "southern-alberta");
    if (!calgary || !southernAlberta) {
      return;
    }

    Object.keys(model.branch).forEach(function (key) {
      calgary[key] = model.branch[key];
    });

    if (model.region) {
      Object.keys(model.region).forEach(function (key) {
        southernAlberta[key] = model.region[key];
      });
    }

    southernAlberta.branches = southernAlberta.branches.map(function (branch) {
      return branch.slug === PHASE1_CALGARY_SLUG ? calgary : branch;
    });
  }

  function loadCalgaryPhase1Data() {
    if (PHASE1_CALGARY_PROMISE) {
      return PHASE1_CALGARY_PROMISE;
    }

    PHASE1_CALGARY_PROMISE = Promise.all([
      apiGetAll("/_api/qfu_quotes?$select=qfu_quoteid,qfu_quotenumber,qfu_customername,qfu_amount,qfu_assignedto,qfu_cssrname,qfu_nextfollowup,qfu_overduesince,qfu_lasttouchedon,qfu_lastfollowupupdatedon,qfu_priorityscore,qfu_status,qfu_sourcedate,qfu_sourceupdatedon,createdon&$top=5000"),
      apiGetAll("/_api/qfu_backorders?$select=qfu_backorderid,qfu_customername,qfu_salesdocnumber,qfu_daysoverdue,qfu_totalvalue,qfu_description,qfu_quantity,qfu_material,qfu_ontimedate,qfu_cssrname,createdon&$top=5000"),
      apiGetAll("/_api/qfu_budgets?$select=qfu_budgetid,qfu_budgetname,qfu_actualsales,qfu_budgetgoal,qfu_percentachieved,qfu_lastupdated,qfu_cadsales,qfu_usdsales,qfu_month,qfu_monthname,qfu_year&$top=200")
    ]).then(function (results) {
      var model = buildCalgaryPhase1Model(results[0] || [], results[1] || [], results[2] || []);
      applyCalgaryPhase1State(model);
      return model;
    }).catch(function (error) {
      console.error("Calgary Phase 1 live data load failed", error);
      applyCalgaryPhase1FailureState();
      return null;
    });

    return PHASE1_CALGARY_PROMISE;
  }

  function overdueTone(value) {
    var days = numericDays(value);
    if (days >= 15) {
      return "overdue";
    }
    if (days >= 5) {
      return "attention";
    }
    if (days > 0) {
      return "info";
    }
    return "neutral";
  }

  function overdueCell(value) {
    return tablePill(overdueTone(value), escapeHtml(String(value || "0 Days")));
  }

  function topUnfollowedRows(rows, limit) {
    return rows
      .slice()
      .filter(function (row) {
        return String(row.nextFollowup || "").toLowerCase().indexOf("unscheduled") !== -1;
      })
      .sort(function (a, b) {
        var valueDiff = numericCurrency(b.value) - numericCurrency(a.value);
        if (valueDiff !== 0) {
          return valueDiff;
        }
        return numericDays(b.daysOverdue) - numericDays(a.daysOverdue);
      })
      .slice(0, limit || 5);
  }

  function formatCurrencyValue(value) {

  function countMatching(items, predicate) {
    return (items || []).filter(function (item, index) {
      return predicate(item, index);
    }).length;
  }

  function uniqueValueCount(items, getter) {
    var seen = {};
    (items || []).forEach(function (item, index) {
      var key = getter(item, index);
      if (key) {
        seen[String(key)] = true;
      }
    });
    return Object.keys(seen).length;
  }

  function sumCurrencyFromRows(rows, key) {
    return (rows || []).reduce(function (total, row) {
      return total + numericCurrency(row[key]);
    }, 0);
  }

  function maxValueFromRows(rows, getter) {
    return (rows || []).reduce(function (maxValue, row, index) {
      return Math.max(maxValue, getter(row, index));
    }, 0);
  }

  function buildOwnerSummaryRows(queueRows, cssrPeople) {
    var cssrMap = {};
    var ownerMap = {};

    (cssrPeople || []).forEach(function (person) {
      var name = String(person.name || "").toUpperCase();
      cssrMap[name] = parseInt(person.count, 10) || 0;
    });

    (queueRows || []).forEach(function (row) {
      var rawOwner = String(row.owner || "Unassigned").trim();
      var ownerKey = rawOwner.toUpperCase();
      var entry = ownerMap[ownerKey];

      if (!entry) {
        entry = {
          owner: rawOwner,
          quoteCount: 0,
          sampleValue: 0,
          oldestQuoteAge: 0,
          unscheduledCount: 0,
          cssrOverdue: cssrMap[ownerKey] || 0
        };
        ownerMap[ownerKey] = entry;
      }

      entry.quoteCount += 1;
      entry.sampleValue += numericCurrency(row.value);
      entry.oldestQuoteAge = Math.max(entry.oldestQuoteAge, numericDays(row.daysOverdue));
      if (String(row.nextFollowup || "").toLowerCase().indexOf("unscheduled") !== -1) {
        entry.unscheduledCount += 1;
      }
    });

    Object.keys(cssrMap).forEach(function (ownerKey) {
      if (!ownerMap[ownerKey]) {
        ownerMap[ownerKey] = {
          owner: ownerKey,
          quoteCount: 0,
          sampleValue: 0,
          oldestQuoteAge: 0,
          unscheduledCount: 0,
          cssrOverdue: cssrMap[ownerKey]
        };
      }
    });

    return Object.keys(ownerMap)
      .map(function (ownerKey) {
        return ownerMap[ownerKey];
      })
      .sort(function (a, b) {
        if (b.sampleValue !== a.sampleValue) {
          return b.sampleValue - a.sampleValue;
        }
        if (b.quoteCount !== a.quoteCount) {
          return b.quoteCount - a.quoteCount;
        }
        return b.cssrOverdue - a.cssrOverdue;
      });
  }

  function createLiveBranchWorkspace(branch, quotes, backorders, budgets, summary) {
    var today = startOfTodayLocal();
    var graceCutoff = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 2);
    var last30Cutoff = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 30);
    var syncLabel = summarySyncLabel(summary, budgets[0] || null);
    var openQuotes = quotes.filter(function (record) {
      return !isClosedQuote(record);
    });
    var openQuoteValue = openQuotes.reduce(function (sum, record) {
      return sum + toNumber(record.qfu_amount);
    }, 0);
    var queueRows = openQuotes.slice().sort(function (a, b) {
      var priorityDiff = toNumber(b.qfu_priorityscore) - toNumber(a.qfu_priorityscore);
      if (priorityDiff !== 0) {
        return priorityDiff;
      }
      return toNumber(b.qfu_amount) - toNumber(a.qfu_amount);
    }).map(function (record) {
      return toQuoteRow(record, today, branch);
    });
    var quoteRows = quotes.slice().sort(function (a, b) {
      return toNumber(b.qfu_amount) - toNumber(a.qfu_amount);
    }).map(function (record) {
      return toQuoteRow(record, today, branch);
    });
    var overdueQuoteRows = openQuotes.filter(function (record) {
      var nextFollowup = parseDateValue(record.qfu_nextfollowup);
      var sourceDate = parseDateValue(record.qfu_sourcedate || record.createdon);
      if (nextFollowup) {
        return nextFollowup < today;
      }
      return sourceDate && sourceDate < graceCutoff;
    }).sort(function (a, b) {
      return quoteAgeDays(b, today) - quoteAgeDays(a, today);
    }).map(function (record) {
      return toQuoteRow(record, today, branch);
    });
    var dueTodayCount = openQuotes.filter(function (record) {
      var nextFollowup = parseDateValue(record.qfu_nextfollowup);
      return nextFollowup && nextFollowup >= today && nextFollowup < new Date(today.getFullYear(), today.getMonth(), today.getDate() + 1);
    }).length;
    var unscheduledOldCount = openQuotes.filter(function (record) {
      var nextFollowup = parseDateValue(record.qfu_nextfollowup);
      var sourceDate = parseDateValue(record.qfu_sourcedate || record.createdon);
      return !nextFollowup && sourceDate && sourceDate < graceCutoff;
    }).length;
    var quotesLast30 = quotes.filter(function (record) {
      var sourceDate = parseDateValue(record.qfu_sourcedate || record.createdon);
      return sourceDate && sourceDate >= last30Cutoff;
    });
    var wonQuotes30NumberRaw = quotesLast30.filter(function (record) {
      return Number(record.qfu_status || 0) === 2;
    }).length;
    var lostQuotes30NumberRaw = quotesLast30.filter(function (record) {
      return Number(record.qfu_status || 0) === 3 || Number(record.qfu_status || 0) === 4;
    }).length;
    var openQuotes30NumberRaw = Math.max(0, quotesLast30.length - wonQuotes30NumberRaw - lostQuotes30NumberRaw);
    var avgQuoteValue30Raw = quotesLast30.length ? quotesLast30.reduce(function (sum, record) {
      return sum + toNumber(record.qfu_amount);
    }, 0) / quotesLast30.length : 0;
    var currentMonthBackorders = backorders.filter(function (record) {
      var onTime = parseDateValue(record.qfu_ontimedate);
      if (!onTime) {
        return false;
      }
      return onTime.getFullYear() === today.getFullYear() && onTime.getMonth() === today.getMonth();
    });
    var currentMonthLate = currentMonthBackorders.filter(function (record) {
      var onTime = parseDateValue(record.qfu_ontimedate);
      return toNumber(record.qfu_daysoverdue) > 0 || (onTime && onTime < today);
    });
    var overdueBackorders = backorders.filter(function (record) {
      var onTime = parseDateValue(record.qfu_ontimedate);
      return toNumber(record.qfu_daysoverdue) > 0 || (onTime && onTime < today);
    }).sort(function (a, b) {
      return toNumber(b.qfu_daysoverdue) - toNumber(a.qfu_daysoverdue);
    });
    var overdueBackorderRows = overdueBackorders.map(function (record) {
      return {
        onTimeDate: record.qfu_ontimedate ? shortDate(String(record.qfu_ontimedate).slice(0, 10)) : "-",
        order: record.qfu_salesdocnumber || "-",
        customer: record.qfu_customername || "-",
        materialNumber: record.qfu_material || "-",
        materialDescription: record.qfu_description || "-",
        quantity: String(record.qfu_quantity || ""),
        value: formatCurrencyNumber(record.qfu_totalvalue),
        cssr: record.qfu_cssrname || "Unassigned",
        daysOverdue: String(toNumber(record.qfu_daysoverdue || 0)) + " days"
      };
    });
    var cssrCounts = {};
    overdueBackorders.forEach(function (record) {
      var key = record.qfu_cssrname || "Unassigned";
      cssrCounts[key] = (cssrCounts[key] || 0) + 1;

    var cssrPeople = Object.keys(cssrCounts).sort(function (a, b) {
      return cssrCounts[b] - cssrCounts[a];

  function buildCalgaryPhase1Model(quotes, backorders, budgets, summaries) {
    var southernAlberta = bySlug(REGIONS, "southern-alberta");
    var branches = {};
    var liveBranches = [];
    var totalOpenQuotes = 0;
    var totalOverdueQuotes = 0;
    var totalOverdueBackorders = 0;
    var totalBudgetTarget = 0;
    var totalBudgetActual = 0;
    var lastSync = null;

    PHASE1_ACTIVE_BRANCH_SLUGS.forEach(function (branchSlug) {
      var branch = bySlug(BRANCHES, branchSlug);
      if (!branch) {
        return;
      }
      var branchQuotes = (quotes || []).filter(function (record) { return record.qfu_branchslug === branchSlug; });
      var branchBackorders = (backorders || []).filter(function (record) { return record.qfu_branchslug === branchSlug; });
      var branchBudgets = (budgets || []).filter(function (record) { return record.qfu_branchslug === branchSlug; });
      var branchSummary = latestSummaryForBranch(summaries || [], branchSlug);
      if (!branchSummary && !branchQuotes.length && !branchBackorders.length && !branchBudgets.length) {
        return;
      }
      var liveBranch = createLiveBranchWorkspace(branch, branchQuotes, branchBackorders, branchBudgets, branchSummary);
      branches[branchSlug] = liveBranch;
      liveBranches.push(branch.code + " " + branch.name);
      totalOpenQuotes += Number(branchSummary ? branchSummary.qfu_openquotes || 0 : liveBranch.workspace.queueRows.length);
      totalOverdueQuotes += Number(liveBranch.overdueQuotes || 0);
      totalOverdueBackorders += Number(liveBranch.overdueBackorders || 0);
      totalBudgetTarget += toNumber(branchSummary ? branchSummary.qfu_budgettarget : (branchBudgets[0] ? branchBudgets[0].qfu_budgetgoal : 0));
      totalBudgetActual += toNumber(branchSummary ? branchSummary.qfu_budgetactual : (branchBudgets[0] ? branchBudgets[0].qfu_actualsales : 0));
      var syncDate = parseDateValue(branchSummary ? branchSummary.qfu_lastcalculatedon || branchSummary.qfu_summarydate : (branchBudgets[0] ? branchBudgets[0].qfu_lastupdated : null));
      if (syncDate && (!lastSync || syncDate > lastSync)) {
        lastSync = syncDate;
      }
    });

    var liveBranchCount = liveBranches.length;
    var paceValue = totalBudgetTarget > 0 ? formatPercentNumber((totalBudgetActual / totalBudgetTarget) * 100) : "Not Live";

    return {
      branches: branches,
      region: southernAlberta ? {
        status: liveBranchCount > 0 ? "live" : "awaiting",
        statusLabel: liveBranchCount > 0 ? "Southern Alberta Live Pilot" : "Awaiting Integration",

        freshness: liveBranchCount > 0 ? "Pilot synced " + dateTimeLabel((lastSync || new Date()).toISOString()) : southernAlberta.freshness,
        branchCount: liveBranchCount + " live / 3 visible",
        quotesNeedingFollowUp: liveBranchCount > 0 ? String(totalOpenQuotes) : "Locked",

        overdueBackorders: liveBranchCount > 0 ? String(totalOverdueBackorders) : "Locked",

        liveBranches: liveBranchCount > 0 ? liveBranches.join(" / ") : "None",
        staleBranches: liveBranchCount > 0 ? "Northern Alberta / Saskatchewan locked" : "4171 / 4172 / 4173 locked",
        footerNote: liveBranchCount > 0 ? "4171 Calgary, 4172 Lethbridge, and 4173 Medicine Hat are live in the frozen branch shell. Team Progress, Workload, Analytics, Northern Alberta, Saskatchewan, and Ops/Admin remain locked." : southernAlberta.footerNote

  function applyCalgaryPhase1State(model) {
    var southernAlberta = bySlug(REGIONS, "southern-alberta");
    if (!model) {
      return;
    }
    Object.keys(model.branches || {}).forEach(function (branchSlug) {
      var branch = bySlug(BRANCHES, branchSlug);
      var liveBranch = model.branches[branchSlug];
      if (!branch || !liveBranch) {
        return;
      }
      Object.keys(liveBranch).forEach(function (key) {
        branch[key] = liveBranch[key];
      });
    });
    if (southernAlberta && model.region) {
      Object.keys(model.region).forEach(function (key) {
        southernAlberta[key] = model.region[key];
      });
      southernAlberta.branches = southernAlberta.branches.map(function (branch) {
        return bySlug(BRANCHES, branch.slug) || branch;
      });
    }
  }

    if (PHASE1_CALGARY_PROMISE) {

      apiGetAll("/_api/qfu_quotes?$select=qfu_quoteid,qfu_quotenumber,qfu_customername,qfu_amount,qfu_assignedto,qfu_cssrname,qfu_nextfollowup,qfu_overduesince,qfu_lasttouchedon,qfu_lastfollowupupdatedon,qfu_priorityscore,qfu_status,qfu_sourcedate,qfu_sourceupdatedon,qfu_branchcode,qfu_branchslug,qfu_regionslug,qfu_sourcefamily,createdon&$top=5000"),

      apiGetAll("/_api/qfu_branchdailysummaries?$select=qfu_branchdailysummaryid,qfu_name,qfu_sourceid,qfu_branchcode,qfu_branchslug,qfu_regionslug,qfu_summarydate,qfu_openquotes,qfu_overduequotes,qfu_duetoday,qfu_unscheduledold,qfu_openquotevalue,qfu_quoteslast30days,qfu_quoteswon30days,qfu_quoteslost30days,qfu_quotesopen30days,qfu_avgquotevalue30days,qfu_backordercount,qfu_overduebackordercount,qfu_currentmonthforecastvalue,qfu_currentmonthlatevalue,qfu_allbackordersvalue,qfu_overduebackordersvalue,qfu_budgetactual,qfu_budgettarget,qfu_budgetpace,qfu_cadsales,qfu_usdsales,qfu_lastcalculatedon,createdon&$top=500")
    ]).then(function (results) {
      var model = buildCalgaryPhase1Model(results[0] || [], results[1] || [], results[2] || [], results[3] || []);

        '<p class="qfu-phase0-ops-copy">The overdue quote route exposes live ' + escapeHtml(branch.name) + ' aging pressure directly in the approved branch workflow while staying read-only.</p>' +
        renderQueueToolbar(String(overdueRows.length) + " live rows", "Every row shown here comes from live qfu_quote data. Aging is visible, but search, filters, and row actions remain locked.") +
        '<div class="qfu-phase0-ops-table-shell"><div class="qfu-phase0-table-wrap"><table class="qfu-phase0-ops-table"><thead><tr><th>Quote #</th><th>Customer</th><th class="qfu-phase0-table__numeric">Value</th><th>Age</th><th>Next Follow-up</th><th>Last Touched</th><th>Assigned</th><th>Open</th><th>Queue</th></tr></thead><tbody>' + renderQueueRows(overdueRows) + "</tbody></table></div></div>"
      ));
      sections.push(panel(
        "Owner Exposure",
        "Live split",
        renderOwnerSummaryTable(ownerRows, "No overdue-owner summary is available because no live quote rows were returned.")
      ));
    } else if (viewKey === "overdue-backorders") {
      stripItems = [
        { label: "March Forecast", value: backorderCards[0] ? backorderCards[0].value : "Locked" },
        { label: "March Late", value: backorderCards[1] ? backorderCards[1].value : "Locked" },
        { label: "All Backorders", value: backorderCards[2] ? backorderCards[2].value : "Locked" },
        { label: "All Late Backorders", value: backorderCards[3] ? backorderCards[3].value : "Locked" },
        { label: "Rows Included Here", value: String(backorderRows.length) },
        { label: "CSSRs Tracked", value: String(uniqueValueCount(backorderRows, function (row) { return String(row.cssr || "").toUpperCase(); })) }
      ];
      scopeBullets = [
        ["Primary list", "Live " + branch.name + " overdue backorder rows"],
        ["Summary cards", "Forecast, late-this-month, and all-backorders values from live target data"],
        ["Rows shown", String(backorderRows.length) + " overdue backorder rows"],
        ["Source", "regionaloperationshub qfu_backorder"],
        ["Still locked", "Filters, thresholds, and backorder actions"]
      ];
      sections.push(panel(
        "Backorder Live Cards",
        "Backorder exposure",
        renderBackorderCards(backorderCards, "Backorder summary cards are not available in the current branch sync.")
      ));
      sections.push(panel(
        "Overdue Backorder Rows",
        "Backorder detail",
        renderBackorderToolbar("Read-only live", "The rows below come from live qfu_backorder data. CSSR routing, min-value filters, and actions remain intentionally locked in Phase 1.") +
        '<div class="qfu-phase0-summary-table-shell"><table class="qfu-phase0-summary-table qfu-phase0-summary-table--backorders"><thead><tr><th>On-time Date</th><th>Order #</th><th>Customer</th><th>Material</th><th>Qty</th><th class="qfu-phase0-table__numeric">Value</th><th>CSSR</th><th>Days Overdue</th></tr></thead><tbody>' + renderBackorderRows(backorderRows) + "</tbody></table></div>"
      ));
    } else {
      return renderLockedDetail(branch, viewKey);
    }

    return (
      '<div class="qfu-phase0-shell">' +
      hero({
        kicker: "Detail",
        title: detail.title,
        subtitle: introCopy,
        badges: [
          badge("live", "Live Data"),
          badge("locked", "Read-only / no write actions")
        ],
        breadcrumbs: breadcrumbs([
          { label: "Hub", url: "/" },
          { label: branch.regionName, url: "/" + branch.regionSlug },
          { label: branch.code + " " + branch.name, url: "/" + branch.regionSlug + "/" + branch.slug },
          { label: detail.title }
        ]),
        meta: [
          { label: "Branch", value: branch.code + " " + branch.name },
          { label: "Region", value: branch.regionName },
          { label: "Data State", value: "Southern Alberta live pilot" }
        ],
        note: "Source: " + summaryNote + ". Search, filters, permissions, and write actions remain intentionally locked while the approved branch structure stays frozen."
      }) +
      panel(
        "Live Detail",
        "Phase 1 live",
        '<div class="qfu-phase0-detail-tabs">' + tabs + "</div>" +
        '<div class="qfu-phase0-empty-state"><strong>Live read-only</strong><p class="qfu-phase0-empty-copy">' + escapeHtml(introCopy) + "</p></div>",
        '<a class="qfu-phase0-secondary-action" href="/' + escapeHtml(branch.regionSlug + "/" + branch.slug) + '">Back to Branch</a>'
      ) +
      kpiStrip(stripItems) +
      sections.join("") +
      '<section class="qfu-phase0-grid qfu-phase0-grid--cards-2">' +
      panel(
        "Scope",
        "What this route now shows",
        renderScopeBullets(scopeBullets)
      ) +
      panel(
        "Next Route",
        "Navigation",
        '<div class="qfu-phase0-empty-state"><strong>Frozen hierarchy</strong><p class="qfu-phase0-empty-copy">Phase 1 wiring stays inside the approved branch pattern. No dashboard redesign, no fake live state, and no changes to the branch information hierarchy are being introduced here.</p></div>' +
        detailButtons(branch)
      ) +
      "</section>" +
      "</div>"
    );
  }

  async function renderPage(root) {
    var pageType = root.getAttribute("data-page");
    var regionSlug = root.getAttribute("data-region");
    var branchSlug = root.getAttribute("data-branch");
    var branch = branchSlug ? bySlug(BRANCHES, branchSlug) : null;
    var region = regionSlug ? bySlug(REGIONS, regionSlug) : null;
    var viewKey = new URLSearchParams(window.location.search).get("view") || "follow-up-queue";

    if (shouldLoadCalgaryPhase1(pageType, regionSlug, branchSlug)) {
      await loadCalgaryPhase1WithDeferredPlaceholder(root);
      branch = branchSlug ? bySlug(BRANCHES, branchSlug) : null;
      region = regionSlug ? bySlug(REGIONS, regionSlug) : null;
    }

    if (pageType === "hub") {
      root.innerHTML = renderHub();
      return;
    }
    if (pageType === "region" && region) {
      root.innerHTML = renderRegion(region);
      return;
    }
    if (pageType === "branch" && branch) {
      root.innerHTML = renderBranch(branch);
      return;
    }
    if (pageType === "detail" && branch) {
      root.innerHTML = renderDetail(branch, viewKey);
      return;
    }
    if (pageType === "ops") {
      root.innerHTML = renderOps();
      return;
    }

    root.innerHTML =
      '<div class="qfu-phase0-shell">' +
      '<div class="qfu-phase0-empty-state"><strong>Page configuration missing</strong><p class="qfu-phase0-empty-copy">Phase 0 shell metadata was not found for this route.</p></div>' +
      "</div>";
  }

  document.addEventListener("DOMContentLoaded", function () {
    var roots = document.querySelectorAll("[data-qfu-phase0]");
    for (var i = 0; i < roots.length; i += 1) {
      renderPage(roots[i]).catch(function (error) {
        console.error("QFU Phase 1 render failed", error);
      });
    }
  });
})();

</script>
